name: Deploy to Websupport

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'
      - '.github/workflows/**'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache-bust local assets
        run: |
          HASH=$(git rev-parse --short HEAD)
          cd deploy
          sed -i "s/utils\.js/utils.js?v=$HASH/g" *.html
          sed -i "s/style\.css/style.css?v=$HASH/g" *.html

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./deploy/
          server-dir: ${{ secrets.FTP_PATH }}
          exclude: |
            **/.DS_Store
            **/takern_api_key.txt
            **/cron_secret.txt
            **/takern_observations.db
            **/takern_observations.db-shm
            **/takern_observations.db-wal
            **/backups/**
            **/cron-update.log

      - name: Clear cache
        run: |
          curl -s -f "https://pierrea.se/takern/cron-update.php?key=${{ secrets.CRON_SECRET }}&action=clear-cache&nowarm"

      - name: Warm cache (parallel)
        run: |
          BASE="https://pierrea.se/takern/stats-api.php?q="
          YEAR=$(date +%Y)
          curl -s -f "${BASE}overview" -o /dev/null &
          curl -s -f "${BASE}species" -o /dev/null &
          curl -s -f "${BASE}geo" -o /dev/null &
          curl -s -f "${BASE}localities" -o /dev/null &
          curl -s -f "${BASE}week_context&year=${YEAR}&days=7" -o /dev/null &
          curl -s -f "${BASE}accumulation&year=${YEAR}" -o /dev/null &
          wait
