<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tåkern – Veckorapport</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#2d6a4f">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f8f7f4;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #6b7280;
      --accent: #2d6a4f;
      --accent-light: #d8f3dc;
      --red: #b91c1c;
      --red-light: #fee2e2;
      --orange: #b45309;
      --orange-light: #fef3c7;
      --purple: #7c3aed;
      --purple-light: #ede9fe;
      --blue: #1d4ed8;
      --blue-light: #dbeafe;
      --border: #e5e7eb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      background: var(--accent);
      color: white;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p { opacity: 0.85; font-size: 0.9rem; }
    header a { color: #d8f3dc; }

    nav { display: flex; gap: 1.5rem; font-size: 0.9rem; }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    /* Summary cards */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .summary-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
    }

    .summary-card .label {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .summary-card .value {
      font-size: 2rem;
      font-weight: 700;
      margin-top: 0.25rem;
    }

    .summary-card .detail {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    /* Section headings */
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Chart section */
    .chart-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .chart-section h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .chart-container {
      position: relative;
      height: 280px;
    }

    /* Highlight cards */
    .highlights {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .highlight-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .highlight-card.first-of-year {
      border-left: 4px solid var(--purple);
    }

    .highlight-card.early-arrival {
      border-left: 4px solid var(--orange);
    }

    .highlight-card.notable {
      border-left: 4px solid var(--red);
    }

    .highlight-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    .highlight-content { flex: 1; }
    .highlight-content .species { font-weight: 600; }
    .highlight-content .context {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .badge {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    .badge-purple { background: var(--purple-light); color: var(--purple); }
    .badge-orange { background: var(--orange-light); color: var(--orange); }
    .badge-red { background: var(--red-light); color: var(--red); }
    .badge-blue { background: var(--blue-light); color: var(--blue); }

    /* Species table */
    .species-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-bottom: 2rem;
    }

    .species-table th {
      text-align: left;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.5rem 0.75rem;
      border-bottom: 2px solid var(--border);
    }

    .species-table td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      vertical-align: middle;
    }

    .species-table tr:last-child td { border-bottom: none; }
    .species-table .species-name { font-weight: 600; }
    .species-table .scientific { font-style: italic; color: var(--muted); font-size: 0.8rem; }

    .days-dots {
      display: flex;
      gap: 3px;
    }

    .day-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
    }

    .day-dot.active { background: var(--accent); }

    /* No highlights placeholder */
    .no-highlights {
      color: var(--muted);
      font-size: 0.9rem;
      font-style: italic;
      margin-bottom: 2rem;
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 1rem 0;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }

    .error {
      background: var(--red-light);
      color: var(--red);
      padding: 1rem;
      border-radius: 8px;
    }

    @media (max-width: 600px) {
      .summary { grid-template-columns: 1fr 1fr; }
      .summary-card .value { font-size: 1.5rem; }
      .chart-container { height: 220px; }
      .species-table .scientific { display: none; }
      .species-table .hist-col { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Tåkern – Veckorapport</h1>
      <p id="header-desc">Laddar...</p>
    </div>
    <nav>
      <a href="index.html">Senaste obs</a>
      <a href="statistik.html">Historisk statistik</a>
    </nav>
  </header>

  <div class="container" id="main">
    <div class="loading" id="loading">Hämtar observationer...</div>
  </div>

  <script>
    const DAYS_BACK = 7;

    // ── Helpers ──

    function formatDayShort(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString("sv-SE", { weekday: "short", day: "numeric", month: "short" });
    }

    function formatDateNice(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr);
      return d.toLocaleDateString("sv-SE", { day: "numeric", month: "short" });
    }

    function dayOfYear(dateStr) {
      const d = new Date(dateStr);
      const start = new Date(d.getFullYear(), 0, 0);
      return Math.floor((d - start) / 86400000);
    }

    function mmddToDoy(mmdd) {
      if (!mmdd) return null;
      const [m, d] = mmdd.split("-").map(Number);
      const date = new Date(2024, m - 1, d);
      return Math.floor((date - new Date(2024, 0, 0)) / 86400000);
    }

    function redlistBadge(cat) {
      if (!cat || cat === "LC") return "";
      const colors = { CR: "red", EN: "red", VU: "orange", NT: "orange" };
      return `<span class="badge badge-${colors[cat] || "blue"}">${cat}</span>`;
    }

    // ── Data processing ──

    function processLiveData(records) {
      const now = new Date();
      const allDates = [];
      const byDate = {};

      for (let i = DAYS_BACK; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        byDate[key] = [];
        allDates.push(key);
      }

      for (const obs of records) {
        const dateKey = (obs.event?.startDate || "").slice(0, 10);
        if (byDate[dateKey]) byDate[dateKey].push(obs);
      }

      const dailyStats = allDates.map(date => {
        const dayObs = byDate[date];
        const species = new Set(dayObs.map(o => o.taxon?.vernacularName));
        return { date, obs: dayObs.length, species: species.size };
      });

      // Species aggregation – also track first occurrenceId for Artportalen link
      const speciesMap = {};
      for (const obs of records) {
        const name = obs.taxon?.vernacularName || obs.taxon?.scientificName;
        const taxonId = obs.taxon?.id;
        if (!name) continue;
        if (!speciesMap[name]) {
          speciesMap[name] = {
            name,
            taxonId: taxonId ? String(taxonId) : null,
            scientific: obs.taxon?.scientificName || "",
            redlist: obs.taxon?.attributes?.redlistCategory || "",
            totalCount: 0,
            maxCount: 0,
            daysSeen: new Set(),
            firstOccurrenceId: null,
            firstObsDate: null,
          };
        }
        const sp = speciesMap[name];
        const count = parseInt(obs.occurrence?.individualCount) || 1;
        sp.totalCount += count;
        if (count > sp.maxCount) sp.maxCount = count;
        const dateKey = (obs.event?.startDate || "").slice(0, 10);
        sp.daysSeen.add(dateKey);
        // Track earliest observation's occurrenceId for linking
        if (!sp.firstObsDate || dateKey < sp.firstObsDate) {
          sp.firstObsDate = dateKey;
          sp.firstOccurrenceId = obs.occurrence?.occurrenceId || null;
        }
      }

      const speciesList = Object.values(speciesMap).map(sp => ({
        ...sp,
        daysSeen: [...sp.daysSeen].sort(),
        firstSeen: [...sp.daysSeen].sort()[0],
      }));
      speciesList.sort((a, b) => b.totalCount - a.totalCount);

      const totalObs = records.length;
      const uniqueSpecies = new Set(records.map(o => o.taxon?.vernacularName)).size;

      return { dailyStats, speciesList, totalObs, uniqueSpecies, allDates };
    }

    function crossReference(liveData, context, phenologyJson) {
      const yearFirsts = context.year_firsts || {};

      // Build phenology lookup by scientific name (matching phenology.json keys)
      const phenByScientific = {};
      for (const [sci, data] of Object.entries(phenologyJson)) {
        phenByScientific[sci] = data;
      }

      const firstOfYear = [];
      const earlyArrivals = [];

      const weekStart = liveData.allDates[0];
      const weekEnd = liveData.allDates[liveData.allDates.length - 1];
      // Look back 14 days for "first of year" to capture recent arrivals
      const recentCutoff = new Date(weekEnd);
      recentCutoff.setDate(recentCutoff.getDate() - 14);
      const recentCutoffStr = recentCutoff.toISOString().slice(0, 10);

      for (const sp of liveData.speciesList) {
        const tid = sp.taxonId;
        if (!tid) continue;

        const yearData = yearFirsts[tid];
        const phenData = phenByScientific[sp.scientific]; // phenology.json keyed by scientific name
        const firstDateThisYear = yearData?.first_date;

        // ── Årets första ──
        // Species whose first obs this year is recent (within last 14 days)
        // If phenology.json has the species, it's a known seasonal migrant – prioritize these
        // Also include species not in year_firsts at all (first time in DB this year)
        const isRecentFirst = !firstDateThisYear || firstDateThisYear >= recentCutoffStr;
        // Exclude obvious year-round residents: if in DB and first_date is January, skip
        const isJanuaryResident = firstDateThisYear && firstDateThisYear.slice(5, 7) === "01";

        if (isRecentFirst && !isJanuaryResident) {
          const histTypical = phenData?.typical;
          const histEarliest = phenData?.earliest;
          firstOfYear.push({
            ...sp,
            firstDate: firstDateThisYear || sp.firstSeen,
            firstUrl: yearData?.first_url || null,
            historicalTypical: histTypical ? histTypical.replace(/^0/, "").replace("-", "/") : null,
            historicalEarliest: histEarliest ? histEarliest.replace(/^0/, "").replace("-", "/") : null,
            yearsSeen: phenData?.years_found || null,
            hasPhenology: !!phenData,
          });
        }

        // ── Tidiga ankomster (uses phenology.json – same logic as index.html) ──
        // Only consider species whose first obs this year is RECENT (last 14 days)
        // A snatterand seen in January is a wintering bird, not an early spring arrival
        if (phenData && isRecentFirst && !isJanuaryResident) {
          const arrivalDate = firstDateThisYear || sp.firstSeen;
          const obsDoy = dayOfYear(arrivalDate);
          const earliestDoy = mmddToDoy(phenData.earliest);
          const typicalDoy = mmddToDoy(phenData.typical);
          if (obsDoy !== null && typicalDoy !== null) {
            // Only flag during spring arrival period
            if (obsDoy <= typicalDoy + 10) {
              const daysBeforeTypical = typicalDoy - obsDoy;
              if (daysBeforeTypical >= 5) {
                earlyArrivals.push({
                  ...sp,
                  firstDate: arrivalDate,
                  firstUrl: yearData?.first_url || null,
                  daysEarly: daysBeforeTypical,
                  typicalDate: phenData.typical,
                  earliestDate: phenData.earliest,
                  yearsSeen: phenData.years_found,
                });
              }
            }
          }
        }
      }

      // Sort: species with phenology data first, then by how early
      firstOfYear.sort((a, b) => (b.hasPhenology ? 1 : 0) - (a.hasPhenology ? 1 : 0) || a.firstDate.localeCompare(b.firstDate));
      earlyArrivals.sort((a, b) => b.daysEarly - a.daysEarly);

      return { firstOfYear, earlyArrivals };
    }

    // ── Artportalen link helper ──
    function apLink(occurrenceId) {
      if (!occurrenceId) return null;
      // occurrenceId format: "urn:lsid:artportalen.se:sighting:XXXXXXX"
      const match = occurrenceId.match(/sighting:(\d+)/i);
      if (match) {
        return `<a href="https://www.artportalen.se/Sighting/${match[1]}" target="_blank" rel="noopener" style="color:var(--accent)">Senaste obs</a>`;
      }
      return null;
    }

    // ── Rendering ──

    function render(liveData, highlights) {
      const container = document.getElementById("main");

      const dateRange = `${formatDayShort(liveData.allDates[0])} – ${formatDayShort(liveData.allDates[liveData.allDates.length - 1])}`;
      document.getElementById("header-desc").innerHTML =
        `${dateRange} · Data från <a href="https://www.artportalen.se" style="color:#d8f3dc">Artportalen</a> · Historik från <a href="statistik.html" style="color:#d8f3dc">20 års databas</a>`;

      let html = "";

      // Summary cards
      html += `<div class="summary">`;
      html += `<div class="summary-card">
        <div class="label">Observationer</div>
        <div class="value">${liveData.totalObs.toLocaleString("sv")}</div>
        <div class="detail">senaste ${DAYS_BACK} dagarna</div>
      </div>`;
      html += `<div class="summary-card">
        <div class="label">Arter</div>
        <div class="value">${liveData.uniqueSpecies}</div>
        <div class="detail">unika arter</div>
      </div>`;
      html += `<div class="summary-card">
        <div class="label">Årets första</div>
        <div class="value">${highlights.firstOfYear.length}</div>
        <div class="detail">arter nya för säsongen</div>
      </div>`;
      html += `<div class="summary-card">
        <div class="label">Tidiga ankomster</div>
        <div class="value">${highlights.earlyArrivals.length}</div>
        <div class="detail">tidigare än normalt</div>
      </div>`;
      html += `</div>`;

      // First of year section
      html += `<div class="section-title">Årets första observationer</div>`;
      if (highlights.firstOfYear.length > 0) {
        html += `<div class="highlights">`;
        for (const sp of highlights.firstOfYear) {
          const countStr = sp.maxCount > 1 ? ` · ${sp.maxCount} ex` : "";
          let contextParts = [];
          if (sp.historicalTypical) contextParts.push(`Normalt först ${sp.historicalTypical}`);
          if (sp.historicalEarliest) contextParts.push(`Tidigast ${sp.historicalEarliest}`);
          if (sp.yearsSeen) contextParts.push(`${sp.yearsSeen} års data`);
          const context = contextParts.join(" · ");

          const speciesLink = sp.taxonId ? `<a href="statistik.html?art=${sp.taxonId}" style="color:inherit">${sp.name}</a>` : sp.name;
          const firstObsLink = sp.firstUrl ? `<a href="${sp.firstUrl}" target="_blank" rel="noopener" style="color:var(--accent)">Första obs</a>` : "";

          html += `<div class="highlight-card first-of-year">
            <div class="highlight-content">
              <div class="species">${speciesLink}${countStr} <span class="badge badge-purple">Årets första</span></div>
              <div class="context">Först sedd ${formatDateNice(sp.firstDate)} · ${sp.scientific}${context ? ` · ${context}` : ""}${firstObsLink ? ` · ${firstObsLink}` : ""}</div>
            </div>
          </div>`;
        }
        html += `</div>`;
      } else {
        html += `<p class="no-highlights">Inga nya arter för säsongen denna vecka.</p>`;
      }

      // Early arrivals section
      html += `<div class="section-title">Tidiga ankomster</div>`;
      html += `<p style="font-size:0.85rem;color:var(--muted);margin-top:-0.5rem;margin-bottom:1rem">Jämfört med kurerade ankomstdata (${highlights.earlyArrivals.length > 0 ? highlights.earlyArrivals[0].yearsSeen || 6 : 6} års historik för ~50 nyckelarter)</p>`;
      if (highlights.earlyArrivals.length > 0) {
        html += `<div class="highlights">`;
        for (const sp of highlights.earlyArrivals) {
          let contextParts = [];
          contextParts.push(`Först sedd ${formatDateNice(sp.firstDate)}`);
          if (sp.daysEarly > 0) contextParts.push(`${sp.daysEarly} dagar före snitt (${sp.typicalDate.replace(/^0/,"").replace("-","/")})`);
          if (sp.earliestDate) contextParts.push(`Tidigast: ${sp.earliestDate.replace(/^0/,"").replace("-","/")}`);

          const speciesLink = sp.taxonId ? `<a href="statistik.html?art=${sp.taxonId}" style="color:inherit">${sp.name}</a>` : sp.name;
          const firstObsLink = sp.firstUrl ? `<a href="${sp.firstUrl}" target="_blank" rel="noopener" style="color:var(--accent)">Första obs</a>` : "";

          html += `<div class="highlight-card early-arrival">
            <div class="highlight-content">
              <div class="species">${speciesLink} <span class="badge badge-orange">Tidig obs</span></div>
              <div class="context">${contextParts.join(" · ")}${firstObsLink ? ` · ${firstObsLink}` : ""}</div>
            </div>
          </div>`;
        }
        html += `</div>`;
      } else {
        html += `<p class="no-highlights">Inga ovanligt tidiga ankomster denna vecka.</p>`;
      }

      // Chart
      html += `<div class="chart-section">
        <h2>Aktivitet per dag</h2>
        <div class="chart-container"><canvas id="dailyChart"></canvas></div>
      </div>`;

      // Full species table
      html += `<div class="section-title">Alla arter denna vecka (${liveData.speciesList.length})</div>`;
      html += `<table class="species-table">
        <thead><tr>
          <th>Art</th>
          <th>Antal</th>
          <th>Dagar</th>
          <th class="hist-col">Status</th>
        </tr></thead><tbody>`;

      const firstOfYearNames = new Set(highlights.firstOfYear.map(s => s.name));
      const earlyNames = new Set(highlights.earlyArrivals.map(s => s.name));

      for (const sp of liveData.speciesList) {
        let statusBadges = "";
        if (firstOfYearNames.has(sp.name)) statusBadges += `<span class="badge badge-purple">Årets 1:a</span> `;
        if (earlyNames.has(sp.name)) statusBadges += `<span class="badge badge-orange">Tidig</span> `;
        const rlBadge = redlistBadge(sp.redlist);

        const dots = liveData.allDates.map(d =>
          `<div class="day-dot${sp.daysSeen.includes(d) ? " active" : ""}" title="${formatDayShort(d)}"></div>`
        ).join("");

        html += `<tr>
          <td><span class="species-name">${sp.name}</span>${rlBadge}<br><span class="scientific">${sp.scientific}</span></td>
          <td>${sp.totalCount}</td>
          <td><div class="days-dots">${dots}</div></td>
          <td class="hist-col">${statusBadges || "–"}</td>
        </tr>`;
      }

      html += `</tbody></table>`;

      html += `<footer>
        Tidig ankomst = jämfört med kurerade fenologidata (2020–2025) ·
        Årets första = arten ej rapporterad vid Tåkern tidigare i år ·
        Data från <a href="https://www.artportalen.se">Artportalen</a> via <a href="https://www.artdatabanken.se">SLU Artdatabanken</a> ·
        Uppdaterad ${new Date().toLocaleString("sv-SE")}
      </footer>`;

      container.innerHTML = html;
      renderChart(liveData.dailyStats);
    }

    function renderChart(dailyStats) {
      const ctx = document.getElementById("dailyChart");
      if (!ctx) return;

      const labels = dailyStats.map(d => {
        const date = new Date(d.date);
        return date.toLocaleDateString("sv-SE", { weekday: "short", day: "numeric", month: "numeric" });
      });

      new Chart(ctx, {
        type: "bar",
        data: {
          labels,
          datasets: [
            {
              label: "Observationer",
              data: dailyStats.map(d => d.obs),
              backgroundColor: "rgba(45, 106, 79, 0.6)",
              borderColor: "#2d6a4f",
              borderWidth: 1,
              borderRadius: 4,
              yAxisID: "y",
            },
            {
              label: "Arter",
              data: dailyStats.map(d => d.species),
              type: "line",
              borderColor: "#b45309",
              backgroundColor: "rgba(180, 83, 9, 0.1)",
              borderWidth: 2,
              pointRadius: 4,
              pointBackgroundColor: "#b45309",
              fill: true,
              tension: 0.3,
              yAxisID: "y1",
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: { legend: { position: "top" } },
          scales: {
            y: {
              type: "linear",
              position: "left",
              title: { display: true, text: "Observationer" },
              beginAtZero: true,
              grid: { color: "rgba(0,0,0,0.05)" },
            },
            y1: {
              type: "linear",
              position: "right",
              title: { display: true, text: "Arter" },
              beginAtZero: true,
              grid: { drawOnChartArea: false },
            },
          },
        },
      });
    }

    // ── Init ──

    async function init() {
      try {
        // Fetch live data, historical context, and curated phenology in parallel
        const [liveResp, contextResp, phenResp] = await Promise.all([
          fetch(`api.php?radius=10&days=${DAYS_BACK}`),
          fetch(`stats-api.php?q=week_context&year=${new Date().getFullYear()}`),
          fetch("phenology.json"),
        ]);

        const liveRaw = await liveResp.json();
        let context = {};
        try { context = await contextResp.json(); } catch (e) { console.warn("Could not load historical context:", e); }
        let phenologyJson = {};
        try { phenologyJson = await phenResp.json(); } catch (e) { console.warn("Could not load phenology.json:", e); }

        if (liveRaw.error) {
          document.getElementById("main").innerHTML =
            `<div class="error"><strong>API-fel:</strong> ${liveRaw.error}<br>${liveRaw.detail || ""}</div>`;
          return;
        }

        const records = liveRaw.records || [];
        if (records.length === 0) {
          document.getElementById("main").innerHTML =
            `<div class="loading">Inga observationer hittades de senaste ${DAYS_BACK} dagarna.</div>`;
          return;
        }

        const liveData = processLiveData(records);
        const highlights = crossReference(liveData, context, phenologyJson);
        render(liveData, highlights);
      } catch (err) {
        document.getElementById("main").innerHTML =
          `<div class="error">Kunde inte hämta data: ${err.message}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
