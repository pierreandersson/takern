<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tåkern – Dashboard</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#2d6a4f">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f8f7f4;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #6b7280;
      --accent: #2d6a4f;
      --accent-light: #d8f3dc;
      --red: #b91c1c;
      --red-light: #fee2e2;
      --orange: #b45309;
      --orange-light: #fef3c7;
      --border: #e5e7eb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      background: var(--accent);
      color: white;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p { opacity: 0.85; font-size: 0.9rem; }
    header a { color: #d8f3dc; }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    /* Summary cards */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .summary-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
    }

    .summary-card .label {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .summary-card .value {
      font-size: 2rem;
      font-weight: 700;
      margin-top: 0.25rem;
    }

    .summary-card .detail {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    /* Chart section */
    .chart-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .chart-section h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .chart-container {
      position: relative;
      height: 280px;
    }

    /* Section headings */
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Week comparison banner */
    .week-comparison {
      background: var(--accent-light);
      border: 1px solid #b7e4c7;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .week-comparison strong { color: var(--accent); }

    /* Trend table */
    .trend-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-bottom: 2rem;
    }

    .trend-table th {
      text-align: left;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.5rem 0.75rem;
      border-bottom: 2px solid var(--border);
    }

    .trend-table td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      vertical-align: middle;
    }

    .trend-table tr:last-child td { border-bottom: none; }

    .trend-table .species-name { font-weight: 600; }
    .trend-table .scientific { font-style: italic; color: var(--muted); font-size: 0.8rem; }

    .trend-icon {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .trend-new { color: #7c3aed; }
    .trend-up { color: var(--accent); }
    .trend-stable { color: var(--muted); }
    .trend-down { color: var(--red); }

    .days-dots {
      display: flex;
      gap: 3px;
    }

    .day-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
    }

    .day-dot.active { background: var(--accent); }

    .badge {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    .badge-red { background: var(--red-light); color: var(--red); }
    .badge-orange { background: var(--orange-light); color: var(--orange); }

    /* Highlights */
    .highlights {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .highlight-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--red);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }

    .highlight-card .species { font-weight: 600; }
    .highlight-card .meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 1rem 0;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }

    .error {
      background: var(--red-light);
      color: var(--red);
      padding: 1rem;
      border-radius: 8px;
    }

    @media (max-width: 600px) {
      .summary { grid-template-columns: 1fr 1fr; }
      .summary-card .value { font-size: 1.5rem; }
      .chart-container { height: 220px; }
      .trend-table .scientific { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Tåkern – Dashboard</h1>
      <p id="header-desc">Laddar...</p>
    </div>
    <nav style="display:flex;gap:1.5rem;font-size:0.9rem">
      <a href="/">Senaste obs</a>
      <a href="/statistik.html">Historik</a>
    </nav>
  </header>

  <div class="container" id="main">
    <div class="loading" id="loading">Hämtar observationer från Artportalen...</div>
  </div>

  <script>
    const DAYS_BACK = 7;
    const STORAGE_KEY = "takern-dashboard-history";

    // ── Helpers ──

    function getISOWeek(date) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
      return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2, "0")}`;
    }

    function formatDayShort(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString("sv-SE", { weekday: "short", day: "numeric", month: "short" });
    }

    function formatDayLabel(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString("sv-SE", { weekday: "short", day: "numeric", month: "numeric" }).replace(/\./g, "");
    }

    function formatDateShort(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr);
      const datePart = d.toLocaleDateString("sv-SE", { day: "numeric", month: "short" });
      const timePart = d.toLocaleTimeString("sv-SE", { hour: "2-digit", minute: "2-digit" });
      return timePart !== "00:00" ? `${datePart} ${timePart}` : datePart;
    }

    function notableScore(obs) {
      let score = 0;
      const rlCat = obs.taxon?.attributes?.redlistCategory || "";
      if (rlCat === "CR") score += 500;
      else if (rlCat === "EN") score += 300;
      else if (rlCat === "VU") score += 150;
      else if (rlCat === "NT") score += 80;
      else if (obs.taxon?.attributes?.isRedlisted) score += 100;
      const count = parseInt(obs.occurrence?.individualCount) || 0;
      if (count >= 500) score += 50;
      else if (count >= 100) score += 30;
      else if (count >= 50) score += 20;
      else if (count >= 20) score += 10;
      if (obs.occurrence?.occurrenceRemarks) score += 5;
      return score;
    }

    function redlistBadge(cat) {
      if (!cat || cat === "LC") return "";
      const colors = { CR: "red", EN: "red", VU: "orange", NT: "orange" };
      const labels = { CR: "CR", EN: "EN", VU: "VU", NT: "NT" };
      return `<span class="badge badge-${colors[cat] || "green"}">${labels[cat] || cat}</span>`;
    }

    // ── Data processing ──

    function processData(records) {
      // Group by date
      const byDate = {};
      const allDates = [];
      const now = new Date();

      for (let i = DAYS_BACK; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        byDate[key] = [];
        allDates.push(key);
      }

      for (const obs of records) {
        const dateKey = (obs.event?.startDate || "").slice(0, 10);
        if (byDate[dateKey]) {
          byDate[dateKey].push(obs);
        }
      }

      // Per-day stats
      const dailyStats = allDates.map(date => {
        const dayObs = byDate[date];
        const species = new Set(dayObs.map(o => o.taxon?.vernacularName));
        return { date, obs: dayObs.length, species: species.size };
      });

      // Species aggregation
      const speciesMap = {};
      for (const obs of records) {
        const name = obs.taxon?.vernacularName || obs.taxon?.scientificName;
        if (!name) continue;
        if (!speciesMap[name]) {
          speciesMap[name] = {
            name,
            scientific: obs.taxon?.scientificName || "",
            redlist: obs.taxon?.attributes?.redlistCategory || "",
            totalCount: 0,
            daysSeen: new Set(),
            firstHalfCount: 0,
            secondHalfCount: 0,
          };
        }
        const sp = speciesMap[name];
        const count = parseInt(obs.occurrence?.individualCount) || 1;
        sp.totalCount += count;
        const dateKey = (obs.event?.startDate || "").slice(0, 10);
        sp.daysSeen.add(dateKey);

        // Split: first half = older days, second half = recent days
        const dateIndex = allDates.indexOf(dateKey);
        const midpoint = Math.floor(allDates.length / 2);
        if (dateIndex >= 0 && dateIndex < midpoint) {
          sp.firstHalfCount += count;
        } else if (dateIndex >= midpoint) {
          sp.secondHalfCount += count;
        }
      }

      // Trend calculation
      const speciesList = Object.values(speciesMap).map(sp => {
        let trend, trendOrder;
        const onlySecondHalf = sp.firstHalfCount === 0 && sp.secondHalfCount > 0;

        if (onlySecondHalf) {
          trend = "new";
          trendOrder = 0;
        } else if (sp.firstHalfCount === 0 && sp.secondHalfCount === 0) {
          trend = "stable";
          trendOrder = 2;
        } else {
          const ratio = sp.secondHalfCount / Math.max(sp.firstHalfCount, 1);
          if (ratio > 1.5) { trend = "up"; trendOrder = 1; }
          else if (ratio < 0.5) { trend = "down"; trendOrder = 3; }
          else { trend = "stable"; trendOrder = 2; }
        }

        const redlistOrder = { CR: 0, EN: 1, VU: 2, NT: 3 }[sp.redlist] ?? 4;

        return { ...sp, trend, trendOrder, redlistOrder, daysSeen: [...sp.daysSeen] };
      });

      // Sort: trend group → redlist → total count
      speciesList.sort((a, b) =>
        a.trendOrder - b.trendOrder ||
        a.redlistOrder - b.redlistOrder ||
        b.totalCount - a.totalCount
      );

      // Top notable observations
      const topNotable = [...records]
        .map(o => ({ ...o, _score: notableScore(o) }))
        .filter(o => o._score >= 80)
        .sort((a, b) => b._score - a._score)
        .slice(0, 5);

      // Summary
      const totalObs = records.length;
      const uniqueSpecies = new Set(records.map(o => o.taxon?.vernacularName)).size;
      const redlistedSpecies = [...new Set(records
        .filter(o => {
          const cat = o.taxon?.attributes?.redlistCategory;
          return cat && cat !== "LC";
        })
        .map(o => o.taxon?.vernacularName))];
      const busiestDay = dailyStats.reduce((best, d) => d.obs > best.obs ? d : best, dailyStats[0]);

      return { dailyStats, speciesList, topNotable, totalObs, uniqueSpecies, redlistedSpecies, busiestDay, allDates };
    }

    // ── localStorage ──

    function saveHistory(data) {
      const weekKey = getISOWeek(new Date());
      let history = {};
      try { history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch {}

      const speciesSummary = {};
      for (const sp of data.speciesList) {
        speciesSummary[sp.name] = { count: sp.totalCount, days: sp.daysSeen.length };
      }

      history[weekKey] = {
        date: new Date().toISOString().slice(0, 10),
        totalObs: data.totalObs,
        uniqueSpecies: data.uniqueSpecies,
        species: speciesSummary,
      };

      // Keep max 52 weeks
      const keys = Object.keys(history).sort();
      while (keys.length > 52) {
        delete history[keys.shift()];
      }

      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      return history;
    }

    function getWeekComparison(history) {
      const weeks = Object.keys(history).sort();
      if (weeks.length < 2) return null;

      const current = history[weeks[weeks.length - 1]];
      const previous = history[weeks[weeks.length - 2]];

      const currentSpecies = new Set(Object.keys(current.species));
      const previousSpecies = new Set(Object.keys(previous.species));
      const newSpecies = [...currentSpecies].filter(s => !previousSpecies.has(s));
      const goneSpecies = [...previousSpecies].filter(s => !currentSpecies.has(s));

      return {
        prevWeek: weeks[weeks.length - 2],
        obsDiff: current.totalObs - previous.totalObs,
        speciesDiff: current.uniqueSpecies - previous.uniqueSpecies,
        newSpecies,
        goneSpecies,
      };
    }

    // ── Rendering ──

    function render(data, history) {
      const container = document.getElementById("main");

      // Header
      document.getElementById("header-desc").innerHTML =
        `Fågelobservationer senaste ${DAYS_BACK} dagarna · Data från <a href="https://www.artportalen.se" style="color:#d8f3dc">Artportalen</a> via <a href="https://www.artdatabanken.se" style="color:#d8f3dc">SLU Artdatabanken</a>`;

      let html = "";

      // Week comparison (if history exists)
      const comparison = getWeekComparison(history);
      if (comparison) {
        const obsTrend = comparison.obsDiff >= 0 ? `+${comparison.obsDiff}` : comparison.obsDiff;
        const spTrend = comparison.speciesDiff >= 0 ? `+${comparison.speciesDiff}` : comparison.speciesDiff;
        html += `<div class="week-comparison">`;
        html += `<strong>Jämfört med ${comparison.prevWeek}:</strong> `;
        html += `${obsTrend} observationer, ${spTrend} arter`;
        if (comparison.newSpecies.length > 0) {
          html += `<br>Nya arter: <strong>${comparison.newSpecies.join(", ")}</strong>`;
        }
        if (comparison.goneSpecies.length > 0) {
          html += `<br>Ej sedda denna vecka: ${comparison.goneSpecies.join(", ")}`;
        }
        html += `</div>`;
      }

      // Summary cards
      html += `<div class="summary">`;
      html += `<div class="summary-card">
        <div class="label">Observationer</div>
        <div class="value">${data.totalObs}</div>
        <div class="detail">senaste ${DAYS_BACK} dagarna</div>
      </div>`;
      html += `<div class="summary-card">
        <div class="label">Arter</div>
        <div class="value">${data.uniqueSpecies}</div>
        <div class="detail">unika arter</div>
      </div>`;
      html += `<div class="summary-card">
        <div class="label">Rödlistade</div>
        <div class="value">${data.redlistedSpecies.length}</div>
        <div class="detail">${data.redlistedSpecies.slice(0, 3).join(", ") || "–"}${data.redlistedSpecies.length > 3 ? " ..." : ""}</div>
      </div>`;
      html += `<div class="summary-card">
        <div class="label">Mest aktiva dag</div>
        <div class="value">${data.busiestDay.obs}</div>
        <div class="detail">${formatDayShort(data.busiestDay.date)}</div>
      </div>`;
      html += `</div>`;

      // Chart
      html += `<div class="chart-section">
        <h2>Aktivitet per dag</h2>
        <div class="chart-container"><canvas id="dailyChart"></canvas></div>
      </div>`;

      // Highlights
      if (data.topNotable.length > 0) {
        html += `<div class="section-title">Höjdpunkter</div>`;
        html += `<div class="highlights">`;
        for (const obs of data.topNotable) {
          const name = obs.taxon?.vernacularName || obs.taxon?.scientificName || "Okänd";
          const count = obs.occurrence?.individualCount;
          const cat = obs.taxon?.attributes?.redlistCategory;
          const loc = obs.location?.locality || "";
          const date = formatDateShort(obs.event?.startDate);
          const remarks = obs.occurrence?.occurrenceRemarks || "";
          html += `<div class="highlight-card">
            <div class="species">${name}${count ? ` · ${count} ex` : ""} ${redlistBadge(cat)}</div>
            <div class="meta">${date}${loc ? ` · ${loc}` : ""}${remarks ? ` · <em>${remarks}</em>` : ""}</div>
          </div>`;
        }
        html += `</div>`;
      }

      // Trend table
      const trendIcons = {
        new: '<span class="trend-icon trend-new">★ Ny</span>',
        up: '<span class="trend-icon trend-up">↑ Ökande</span>',
        stable: '<span class="trend-icon trend-stable">→ Stabil</span>',
        down: '<span class="trend-icon trend-down">↓ Minskande</span>',
      };

      html += `<div class="section-title">Arter – trender denna vecka</div>`;
      html += `<table class="trend-table">
        <thead><tr>
          <th>Art</th>
          <th>Antal</th>
          <th>Dagar</th>
          <th>Trend</th>
        </tr></thead><tbody>`;

      for (const sp of data.speciesList) {
        const badge = redlistBadge(sp.redlist);
        const dots = data.allDates.map(d =>
          `<div class="day-dot${sp.daysSeen.includes(d) ? " active" : ""}" title="${formatDayShort(d)}"></div>`
        ).join("");

        html += `<tr>
          <td><span class="species-name">${sp.name}</span>${badge}<br><span class="scientific">${sp.scientific}</span></td>
          <td>${sp.totalCount}</td>
          <td><div class="days-dots">${dots}</div></td>
          <td>${trendIcons[sp.trend]}</td>
        </tr>`;
      }

      html += `</tbody></table>`;

      // Footer
      html += `<footer>
        Historik sparas lokalt i din webbläsare · Senast uppdaterad ${new Date().toLocaleString("sv-SE")}
      </footer>`;

      container.innerHTML = html;

      // Draw chart
      renderChart(data.dailyStats);
    }

    function renderChart(dailyStats) {
      const ctx = document.getElementById("dailyChart");
      if (!ctx) return;

      const labels = dailyStats.map(d => {
        const date = new Date(d.date);
        return date.toLocaleDateString("sv-SE", { weekday: "short", day: "numeric", month: "numeric" });
      });

      new Chart(ctx, {
        type: "bar",
        data: {
          labels,
          datasets: [
            {
              label: "Observationer",
              data: dailyStats.map(d => d.obs),
              backgroundColor: "rgba(45, 106, 79, 0.6)",
              borderColor: "#2d6a4f",
              borderWidth: 1,
              borderRadius: 4,
              yAxisID: "y",
            },
            {
              label: "Arter",
              data: dailyStats.map(d => d.species),
              type: "line",
              borderColor: "#b45309",
              backgroundColor: "rgba(180, 83, 9, 0.1)",
              borderWidth: 2,
              pointRadius: 4,
              pointBackgroundColor: "#b45309",
              fill: true,
              tension: 0.3,
              yAxisID: "y1",
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { position: "top" },
          },
          scales: {
            y: {
              type: "linear",
              position: "left",
              title: { display: true, text: "Observationer" },
              beginAtZero: true,
              grid: { color: "rgba(0,0,0,0.05)" },
            },
            y1: {
              type: "linear",
              position: "right",
              title: { display: true, text: "Arter" },
              beginAtZero: true,
              grid: { drawOnChartArea: false },
            },
          },
        },
      });
    }

    // ── Init ──

    async function init() {
      try {
        const resp = await fetch(`/api/observations?radius=10&days=${DAYS_BACK}`);
        const raw = await resp.json();

        if (raw.error) {
          document.getElementById("main").innerHTML =
            `<div class="error"><strong>API-fel:</strong> ${raw.error}<br>${raw.detail || ""}</div>`;
          return;
        }

        const records = raw.records || [];
        const data = processData(records);
        const history = saveHistory(data);
        render(data, history);
      } catch (err) {
        document.getElementById("main").innerHTML =
          `<div class="error">Kunde inte hämta data: ${err.message}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
