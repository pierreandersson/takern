<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fåglar runt Tåkern – Monitor</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <meta name="theme-color" content="#0f172a">
  <meta property="og:image" content="https://pierrea.se/takern/og-image.jpg">
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card-border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #4ade80;
      --accent-dim: rgba(74, 222, 128, 0.15);
      --red: #f87171;
      --red-dim: rgba(248, 113, 113, 0.15);
      --orange: #fbbf24;
      --orange-dim: rgba(251, 191, 36, 0.15);
      --purple: #a78bfa;
      --purple-dim: rgba(167, 139, 250, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { font-size: clamp(12px, 1.8vh, 24px); }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    /* Header */
    header {
      padding: 0.8rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid var(--card-border);
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    header .stats {
      font-size: 0.85rem;
      color: var(--muted);
      margin-left: 1.5rem;
    }

    header .clock {
      font-size: 0.95rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    /* Main grid */
    .grid {
      display: grid;
      grid-template-columns: 55% 45%;
      grid-template-rows: 1.3fr 0.7fr 1fr;
      gap: 0.75rem;
      padding: 0.75rem;
      min-height: 0;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.5rem;
      flex-shrink: 0;
    }

    /* Chart panel */
    .chart-panel { grid-column: 1; grid-row: 1; }
    .chart-panel .chart-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    /* Time-of-day panel */
    .time-panel { grid-column: 1; grid-row: 2; overflow: visible; }
    .time-panel .chart-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    /* Bottom-left: locations + highlights */
    .bottom-left {
      grid-column: 1;
      grid-row: 3;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      background: none;
      border: none;
      padding: 0;
    }

    .locations-panel, .highlights-panel-inner {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Species panel spans rows 2-3 on right */
    .species-panel {
      grid-column: 2;
      grid-row: 2 / 4;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Location rows */
    .loc-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0;
      font-size: 0.8rem;
    }
    .loc-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .loc-bar-wrap {
      width: 3rem;
      height: 0.4rem;
      background: var(--card-border);
      border-radius: 3px;
      flex-shrink: 0;
    }
    .loc-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
    }
    .loc-count {
      width: 20px;
      text-align: right;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 0.65rem;
    }

    /* Species list with sparklines */
    .species-list {
      flex: 1;
      overflow: hidden;
    }

    .species-row {
      display: grid;
      grid-template-columns: 1fr 80px auto;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem 0;
      border-bottom: 1px solid var(--card-border);
      font-size: 0.8rem;
    }

    .species-row:last-child { border-bottom: none; }

    .species-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .species-count {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: var(--muted);
    }

    /* Right column */
    .new-panel { grid-column: 2; grid-row: 1; }

    .new-list, .highlights-list {
      flex: 1;
      overflow: hidden;
    }

    .new-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--card-border);
      font-size: 0.8rem;
    }

    .new-row:last-child { border-bottom: none; }
    .new-row .name { font-weight: 600; flex: 1; }
    .new-row .first-seen { color: var(--muted); font-size: 0.75rem; white-space: nowrap; }

    .days-dots {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .day-dot {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: var(--card-border);
    }

    .day-dot.active { background: var(--accent); }

    /* Highlight cards */
    .highlight-card {
      padding: 0.5rem 0.6rem;
      border-left: 3px solid var(--red);
      border-radius: 0 6px 6px 0;
      background: var(--red-dim);
      margin-bottom: 0.5rem;
    }

    .highlight-card:last-child { margin-bottom: 0; }
    .highlight-card .species { font-weight: 600; font-size: 0.85rem; }
    .highlight-card .meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; }

    .badge {
      display: inline-block;
      padding: 0.05rem 0.4rem;
      border-radius: 3px;
      font-size: 0.65rem;
      font-weight: 700;
      margin-left: 0.3rem;
      vertical-align: middle;
    }

    .badge-red { background: var(--red-dim); color: var(--red); }
    .badge-orange { background: var(--orange-dim); color: var(--orange); }

    .trend-badge {
      display: inline-block;
      padding: 0.05rem 0.35rem;
      border-radius: 3px;
      font-size: 0.65rem;
      font-weight: 700;
      margin-left: 0.3rem;
    }

    .trend-up { background: var(--accent-dim); color: var(--accent); }
    .trend-down { background: var(--red-dim); color: var(--red); }

    /* Footer */
    footer {
      padding: 0.4rem 1.5rem;
      font-size: 0.7rem;
      color: var(--card-border);
      display: flex;
      justify-content: space-between;
      border-top: 1px solid var(--card-border);
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
    }
  </style>

</head>
<body>
  <header>
    <div style="display:flex;align-items:baseline">
      <h1>Fåglar runt Tåkern</h1>
      <span class="stats" id="stats"></span>
    </div>
    <span class="clock" id="clock"></span>
  </header>

  <div class="grid" id="grid">
    <div class="loading">Hämtar data...</div>
  </div>

  <footer>
    <span id="footer-left">Data från Artportalen, Ringmärkningscentralen m.fl. via SLU Artdatabanken</span>
    <span id="footer-right"></span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script>
    const DAYS_BACK = 7;
    const REFRESH_INTERVAL = 15 * 60 * 1000;
    let nextRefresh = Date.now() + REFRESH_INTERVAL;

    // ── Clock ──
    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent =
        now.toLocaleDateString("sv-SE", { day: "numeric", month: "long", year: "numeric" }) +
        " · " + now.toLocaleTimeString("sv-SE", { hour: "2-digit", minute: "2-digit" });

      const minsLeft = Math.max(0, Math.ceil((nextRefresh - Date.now()) / 60000));
      document.getElementById("footer-right").textContent =
        `Uppdateras om ${minsLeft} min`;
    }
    setInterval(updateClock, 10000);
    updateClock();

    // ── Helpers ──
    function formatDayShort(dateStr) {
      return new Date(dateStr).toLocaleDateString("sv-SE", { weekday: "short", day: "numeric", month: "short" });
    }

    function formatDateCompact(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr);
      const datePart = d.toLocaleDateString("sv-SE", { day: "numeric", month: "short" });
      const timePart = d.toLocaleTimeString("sv-SE", { hour: "2-digit", minute: "2-digit" });
      return timePart !== "00:00" ? `${datePart} ${timePart}` : datePart;
    }

    function notableScore(obs) {
      let score = 0;
      const rlCat = obs.taxon?.attributes?.redlistCategory || "";
      if (rlCat === "CR") score += 500;
      else if (rlCat === "EN") score += 300;
      else if (rlCat === "VU") score += 150;
      else if (rlCat === "NT") score += 80;
      else if (obs.taxon?.attributes?.isRedlisted) score += 100;
      const count = parseInt(obs.occurrence?.individualCount) || 0;
      if (count >= 500) score += 50;
      else if (count >= 100) score += 30;
      else if (count >= 50) score += 20;
      else if (count >= 20) score += 10;
      if (obs.occurrence?.occurrenceRemarks) score += 5;
      return score;
    }

    function redlistBadge(cat) {
      if (!cat || cat === "LC") return "";
      const colors = { CR: "red", EN: "red", VU: "orange", NT: "orange" };
      return `<span class="badge badge-${colors[cat] || "orange"}">${cat}</span>`;
    }

    // ── Deduplication ──
    function buildDeduped(records, allDates) {
      // Key: "species|locality|day" → max count
      const best = {};
      for (const obs of records) {
        const name = obs.taxon?.vernacularName || obs.taxon?.scientificName;
        if (!name) continue;
        const loc = obs.location?.locality || "?";
        const day = (obs.event?.startDate || "").slice(0, 10);
        const count = parseInt(obs.occurrence?.individualCount) || 1;
        const key = `${name}|${loc}|${day}`;
        best[key] = Math.max(best[key] || 0, count);
      }

      // Aggregate per species per day
      const speciesDaily = {}; // name → { day → dedupedCount }
      for (const [key, count] of Object.entries(best)) {
        const [name, , day] = key.split("|");
        if (!speciesDaily[name]) speciesDaily[name] = {};
        speciesDaily[name][day] = (speciesDaily[name][day] || 0) + count;
      }

      return speciesDaily;
    }

    // ── Data processing ──
    function processData(records) {
      const now = new Date();
      const allDates = [];
      const byDate = {};

      for (let i = DAYS_BACK; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        byDate[key] = [];
        allDates.push(key);
      }

      for (const obs of records) {
        const dateKey = (obs.event?.startDate || "").slice(0, 10);
        if (byDate[dateKey]) byDate[dateKey].push(obs);
      }

      // Daily stats (observation count, not deduped – that's actual activity)
      const dailyStats = allDates.map(date => {
        const dayObs = byDate[date];
        return { date, obs: dayObs.length, species: new Set(dayObs.map(o => o.taxon?.vernacularName)).size };
      });

      // Deduped species data
      const speciesDaily = buildDeduped(records, allDates);

      // Build species list with trends
      const midpoint = Math.floor(allDates.length / 2);
      const speciesMeta = {};

      for (const obs of records) {
        const name = obs.taxon?.vernacularName || obs.taxon?.scientificName;
        if (!name || speciesMeta[name]) continue;
        speciesMeta[name] = {
          scientific: obs.taxon?.scientificName || "",
          redlist: obs.taxon?.attributes?.redlistCategory || "",
        };
      }

      const speciesList = Object.entries(speciesDaily).map(([name, daily]) => {
        const meta = speciesMeta[name] || {};
        const dayValues = allDates.map(d => daily[d] || 0);
        const totalCount = dayValues.reduce((a, b) => a + b, 0);
        const daysSeen = allDates.filter(d => daily[d] > 0);

        const firstHalf = dayValues.slice(0, midpoint).reduce((a, b) => a + b, 0);
        const secondHalf = dayValues.slice(midpoint).reduce((a, b) => a + b, 0);

        let trend;
        if (firstHalf === 0 && secondHalf > 0) trend = "new";
        else if (firstHalf === 0 && secondHalf === 0) trend = "stable";
        else {
          const ratio = secondHalf / Math.max(firstHalf, 1);
          if (ratio > 1.5) trend = "up";
          else if (ratio < 0.5) trend = "down";
          else trend = "stable";
        }

        const redlistOrder = { CR: 0, EN: 1, VU: 2, NT: 3 }[meta.redlist] ?? 4;
        const trendOrder = { new: 0, up: 1, stable: 2, down: 3 }[trend];

        return {
          name, ...meta, totalCount, daysSeen, dayValues, trend, trendOrder, redlistOrder,
          firstSeen: daysSeen[0] || "",
        };
      });

      // Sort for different views
      const byTrend = [...speciesList].sort((a, b) =>
        a.trendOrder - b.trendOrder || a.redlistOrder - b.redlistOrder || b.totalCount - a.totalCount
      );

      const byCount = [...speciesList].sort((a, b) => b.totalCount - a.totalCount);

      // Trend counts
      const trendCounts = { new: 0, up: 0, stable: 0, down: 0 };
      for (const sp of speciesList) trendCounts[sp.trend]++;

      // Top notable observations
      // Top notable – one per species (keep highest score)
      const notableBest = {};
      for (const o of records) {
        const s = notableScore(o);
        if (s < 80) continue;
        const name = o.taxon?.vernacularName || o.taxon?.scientificName;
        if (!name) continue;
        if (!notableBest[name] || s > notableBest[name]._score) {
          notableBest[name] = { ...o, _score: s };
        }
      }
      const topNotable = Object.values(notableBest)
        .sort((a, b) => b._score - a._score)
        .slice(0, 10);

      // Summary
      const totalObs = records.length;
      const uniqueSpecies = new Set(records.map(o => o.taxon?.vernacularName)).size;
      const redlistedCount = new Set(records
        .filter(o => { const c = o.taxon?.attributes?.redlistCategory; return c && c !== "LC"; })
        .map(o => o.taxon?.vernacularName)).size;

      // Top locations by unique species count
      const locSpecies = {};
      for (const obs of records) {
        const loc = obs.location?.locality;
        if (!loc) continue;
        const shortLoc = loc.split(",")[0].trim();
        const name = obs.taxon?.vernacularName || obs.taxon?.scientificName;
        if (!locSpecies[shortLoc]) locSpecies[shortLoc] = new Set();
        locSpecies[shortLoc].add(name);
      }
      const topLocations = Object.entries(locSpecies)
        .map(([loc, species]) => ({ loc, species: species.size }))
        .sort((a, b) => b.species - a.species)
        .slice(0, 10);

      // Hourly activity (observations per hour bucket)
      const hourly = new Array(24).fill(0);
      for (const obs of records) {
        const ds = obs.event?.startDate || "";
        const m = ds.match(/T(\d{2}):/);
        if (m) hourly[parseInt(m[1])]++;
      }

      return {
        dailyStats, byTrend, byCount, trendCounts, topNotable,
        totalObs, uniqueSpecies, redlistedCount, allDates,
        topLocations, hourly,
      };
    }

    // ── Sparkline renderer ──
    function sparkline(values, width, height) {
      const max = Math.max(...values, 1);
      const step = width / (values.length - 1);
      const points = values.map((v, i) => `${i * step},${height - (v / max) * (height - 2)}`);
      return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="display:block">
        <polyline points="${points.join(" ")}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linejoin="round"/>
        ${values.map((v, i) => v > 0 ? `<circle cx="${i * step}" cy="${height - (v / max) * (height - 2)}" r="1.5" fill="var(--accent)"/>` : "").join("")}
      </svg>`;
    }

    // ── Render ──
    function render(data) {
      document.getElementById("stats").textContent =
        `${data.totalObs} obs · ${data.uniqueSpecies} arter · ${data.redlistedCount} rödlistade · senaste ${DAYS_BACK} dagarna`;

      const grid = document.getElementById("grid");
      // Dynamic list sizes based on viewport height
      const vh = window.innerHeight;
      const maxNew = Math.min(Math.floor(vh / 80), 12);
      const maxTop = Math.min(Math.floor(vh / 50), 18);
      const maxHighlights = Math.min(Math.floor(vh / 130), 7);
      const maxLocations = Math.min(Math.floor(vh / 55), 15);

      const allNew = data.byTrend.filter(s => s.trend === "new");
      const newSpecies = allNew.slice(0, maxNew);
      const topSpecies = data.byCount.slice(0, maxTop);

      grid.innerHTML = `
        <div class="panel chart-panel">
          <div class="panel-title">Aktivitet per dag</div>
          <div class="chart-wrap"><canvas id="activityChart"></canvas></div>
        </div>

        <div class="panel new-panel">
          <div class="panel-title">★ Nyanlända arter (${allNew.length})</div>
          <div class="new-list">
            ${newSpecies.length === 0 ? '<div style="color:var(--muted);font-size:0.8rem">Inga nya arter denna vecka</div>' :
              newSpecies.map(sp => `
                <div class="new-row">
                  <span class="name">${sp.name}${redlistBadge(sp.redlist)}</span>
                  <div class="days-dots">
                    ${data.allDates.map(d => `<div class="day-dot${sp.daysSeen.includes(d) ? " active" : ""}" title="${formatDayShort(d)}"></div>`).join("")}
                  </div>
                  <span class="first-seen">${formatDayShort(sp.firstSeen)}</span>
                </div>
              `).join("")}
          </div>
        </div>

        <div class="panel time-panel">
          <div class="panel-title">Tid på dygnet</div>
          <div class="chart-wrap"><canvas id="timeChart"></canvas></div>
        </div>

        <div class="species-panel">
          <div class="panel-title">Topparter (deduplicerat antal)</div>
          <div class="species-list">
            ${topSpecies.map(sp => {
              const trendBadge = sp.trend === "up" ? '<span class="trend-badge trend-up">↑</span>' :
                                 sp.trend === "down" ? '<span class="trend-badge trend-down">↓</span>' : "";
              return `
                <div class="species-row">
                  <span class="species-name">${sp.name}${redlistBadge(sp.redlist)}${trendBadge}</span>
                  ${sparkline(sp.dayValues, 80, 20)}
                  <span class="species-count">${sp.totalCount.toLocaleString("sv-SE")}</span>
                </div>`;
            }).join("")}
          </div>
        </div>

        <div class="bottom-left">
          <div class="locations-panel">
            <div class="panel-title">Topplokaler (arter)</div>
            <div style="flex:1;overflow:hidden">
              ${data.topLocations.slice(0, maxLocations).map(l => {
                const pct = Math.round((l.species / data.topLocations[0].species) * 100);
                return `<div class="loc-row">
                  <span class="loc-name">${l.loc}</span>
                  <div class="loc-bar-wrap"><div class="loc-bar" style="width:${pct}%"></div></div>
                  <span class="loc-count">${l.species}</span>
                </div>`;
              }).join("")}
            </div>
          </div>
          <div class="highlights-panel-inner">
            <div class="panel-title">Höjdpunkter</div>
            <div class="highlights-list">
              ${data.topNotable.length === 0 ? '<div style="color:var(--muted);font-size:0.8rem">Inga rödlistade observationer</div>' :
                data.topNotable.slice(0, maxHighlights).map(obs => {
                  const name = obs.taxon?.vernacularName || "Okänd";
                  const count = parseInt(obs.occurrence?.individualCount) || 0;
                  const cat = obs.taxon?.attributes?.redlistCategory;
                  const loc = obs.location?.locality || "";
                  const date = formatDateCompact(obs.event?.startDate);
                  const remarks = obs.occurrence?.occurrenceRemarks || "";
                  const spData = data.byTrend.find(s => s.name === name);
                  const dots = spData ? data.allDates.map(d =>
                    `<div class="day-dot${spData.daysSeen.includes(d) ? " active" : ""}" title="${formatDayShort(d)}"></div>`
                  ).join("") : "";
                  return `
                    <div class="highlight-card">
                      <div style="display:flex;justify-content:space-between;align-items:center">
                        <span class="species">${name}${count ? ` · ${count} ex` : ""} ${redlistBadge(cat)}</span>
                        ${dots ? `<div class="days-dots">${dots}</div>` : ""}
                      </div>
                      <div class="meta">${date}${loc ? ` · ${loc}` : ""}${remarks ? ` · <em>${remarks}</em>` : ""}</div>
                    </div>`;
                }).join("")}
            </div>
          </div>
        </div>
      `;

      renderActivityChart(data.dailyStats);
      renderTimeChart(data.hourly);
    }

    let _activityChart = null;
    let _timeChart = null;

    function renderActivityChart(dailyStats) {
      const ctx = document.getElementById("activityChart");
      if (!ctx) return;
      if (_activityChart) { _activityChart.destroy(); _activityChart = null; }

      const labels = dailyStats.map(d =>
        new Date(d.date).toLocaleDateString("sv-SE", { weekday: "short", day: "numeric", month: "numeric" })
      );

      _activityChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels,
          datasets: [
            {
              label: "Observationer",
              data: dailyStats.map(d => d.obs),
              backgroundColor: "rgba(74, 222, 128, 0.4)",
              borderColor: "#4ade80",
              borderWidth: 1,
              borderRadius: 3,
              yAxisID: "y",
            },
            {
              label: "Arter",
              data: dailyStats.map(d => d.species),
              type: "line",
              borderColor: "#fbbf24",
              backgroundColor: "rgba(251, 191, 36, 0.08)",
              borderWidth: 2,
              pointRadius: 3,
              pointBackgroundColor: "#fbbf24",
              fill: true,
              tension: 0.3,
              yAxisID: "y1",
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { position: "top", labels: { color: "#94a3b8", font: { size: 11 }, boxWidth: 12 } },
          },
          scales: {
            x: { ticks: { color: "#64748b", font: { size: 10 } }, grid: { color: "rgba(255,255,255,0.04)" } },
            y: {
              position: "left",
              title: { display: true, text: "Obs", color: "#64748b", font: { size: 10 } },
              ticks: { color: "#64748b", font: { size: 10 } },
              beginAtZero: true,
              grid: { color: "rgba(255,255,255,0.04)" },
            },
            y1: {
              position: "right",
              title: { display: true, text: "Arter", color: "#64748b", font: { size: 10 } },
              ticks: { color: "#64748b", font: { size: 10 } },
              beginAtZero: true,
              grid: { drawOnChartArea: false },
            },
          },
        },
      });
    }

    function renderTimeChart(hourly) {
      const ctx = document.getElementById("timeChart");
      if (!ctx) return;
      const startH = 4, endH = 22;
      const labels = [];
      const values = [];
      for (let h = startH; h <= endH; h++) {
        labels.push(`${h}:00`);
        values.push(hourly[h] || 0);
      }

      if (_timeChart) { _timeChart.destroy(); _timeChart = null; }
      _timeChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: "rgba(167, 139, 250, 0.5)",
            borderColor: "#a78bfa",
            borderWidth: 1,
            borderRadius: 3,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              ticks: {
                color: "#64748b",
                font: { size: 10 },
                autoSkip: false,
                maxRotation: 0,
                callback: function(val, i) { return i % 3 === 0 ? labels[i].replace(":00", "") : ""; },
              },
              grid: { display: false },
            },
            y: {
              ticks: { color: "#64748b", font: { size: 10 } },
              beginAtZero: true,
              grid: { color: "rgba(255,255,255,0.04)" },
            },
          },
        },
      });
    }

    // ── Init ──
    async function loadAndRender() {
      try {
        const resp = await fetch(`api.php?radius=10&days=${DAYS_BACK}`);
        const raw = await resp.json();

        if (raw.error) {
          document.getElementById("grid").innerHTML =
            `<div class="loading" style="color:var(--red)">API-fel: ${raw.error}</div>`;
          return;
        }

        const records = raw.records || [];
        const data = processData(records);
        render(data);
      } catch (err) {
        document.getElementById("grid").innerHTML =
          `<div class="loading" style="color:var(--red)">Fel: ${err.message}</div>`;
      }
    }

    loadAndRender();
    setInterval(() => {
      nextRefresh = Date.now() + REFRESH_INTERVAL;
      loadAndRender();
    }, REFRESH_INTERVAL);
  </script>
</body>
</html>
