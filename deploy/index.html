<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tåkern – Senaste fågelobservationer</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#2d6a4f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 80px);
    }

    #map {
      min-height: 400px;
    }

    .panel {
      overflow-y: auto;
      padding: 1rem;
    }

    .controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls button {
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }

    .controls button:hover { border-color: var(--accent); }
    .controls button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .status {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .obs-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .obs-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .obs-card:hover {
      border-color: var(--accent);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .obs-card.highlight {
      border-left: 4px solid var(--red);
    }

    .obs-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .obs-species {
      font-weight: 600;
      font-size: 1rem;
    }

    .obs-scientific {
      font-style: italic;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .obs-count {
      font-weight: 700;
      font-size: 1.1rem;
      white-space: nowrap;
    }

    .obs-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.25rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .group-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .group-card.highlight {
      border-left: 4px solid var(--red);
    }

    .group-header {
      padding: 0.75rem 1rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.15s;
    }

    .group-header:hover {
      background: var(--bg);
    }

    .group-header .obs-meta {
      margin-top: 0.15rem;
    }

    .group-toggle {
      color: var(--muted);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .group-details {
      display: none;
      border-top: 1px solid var(--border);
    }

    .group-details.open {
      display: block;
    }

    .group-details .obs-card {
      border: none;
      border-radius: 0;
      border-top: 1px dashed var(--border);
      padding: 0.5rem 1rem 0.5rem 1.5rem;
      font-size: 0.9rem;
    }

    .group-details .obs-card:first-child {
      border-top: none;
    }

    .group-details .obs-card.highlight {
      border-left: none;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        height: auto;
      }
      #map { height: 50vh; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Tåkern – Fågelobservationer</h1>
      <p id="header-desc">Senaste observationerna inom 10 km från Tåkern · Data från <a href="https://www.artportalen.se">Artportalen</a> m.fl. via <a href="https://www.artdatabanken.se">SLU Artdatabanken</a></p>
    </div>
    <nav>
      <a href="statistik.html">Historisk statistik</a>
      <a href="veckorapport.html">Veckorapport</a>
    </nav>
  </header>

  <div class="layout">
    <div id="map"></div>
    <div class="panel">
      <div class="controls">
        <button class="active" data-sort="recent">Senaste</button>
        <button data-sort="notable">Mest noterbara</button>
        <button data-sort="count">Högst antal</button>
        <button data-sort="species">Art A–Ö</button>
      </div>
      <div class="controls" id="radius-controls">
        <span style="font-size:0.85rem;color:var(--muted)">Radie:</span>
        <button data-radius="8">8 km</button>
        <button class="active" data-radius="10">10 km</button>
        <button data-radius="12">12 km</button>
        <button data-radius="15">15 km</button>
        <span style="border-left:1px solid var(--border);height:1.5rem;margin:0 0.25rem"></span>
        <button id="reload-btn" title="Hämta ny data">&#x21bb;</button>
      </div>
      <div class="status" id="status">Laddar...</div>
      <div class="obs-list" id="obs-list">
        <div class="loading">Hämtar observationer...</div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── Map setup ──
    const map = L.map("map").setView([58.35, 14.81], 12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; OpenStreetMap contributors | Data: <a href="https://www.artdatabanken.se">Artdatabanken</a>',
      maxZoom: 18,
    }).addTo(map);

    let radiusCircle = null;
    let currentRadius = 10;
    const markers = L.layerGroup().addTo(map);

    function drawRadiusCircle(km) {
      if (radiusCircle) map.removeLayer(radiusCircle);
      radiusCircle = L.circle([58.35, 14.81], {
        radius: km * 1000,
        color: "#2d6a4f",
        fillColor: "#d8f3dc",
        fillOpacity: 0.1,
        weight: 1.5,
        dashArray: "6 4",
      }).addTo(map);
    }
    drawRadiusCircle(currentRadius);

    function getCount(obs) {
      return parseInt(obs.occurrence?.individualCount) || 0;
    }

    // ── Phenology & rarity ──
    let phenologyData = {};
    let rarityData = {};

    function obsDoy(obs) {
      const d = obs.event?.startDate;
      if (!d) return null;
      const date = new Date(d);
      return Math.floor((date - new Date(date.getFullYear(), 0, 1)) / 86400000) + 1;
    }

    function phenologyBonus(obs) {
      const tid = String(obs.taxon?.id || "");
      const ph = phenologyData[tid];
      if (!ph || !ph.avg_first_doy) return { score: 0, label: null };
      const doy = obsDoy(obs);
      if (!doy) return { score: 0, label: null };
      const typical = ph.avg_first_doy;
      const earliest = ph.earliest_doy || typical - 10;
      // Only relevant during spring arrival period
      if (doy > typical + 10) return { score: 0, label: null };
      if (doy < earliest) return { score: 500, label: "Ovanligt tidig obs" };
      if (doy <= typical + 10) return { score: 200, label: "Tidig obs" };
      return { score: 0, label: null };
    }

    // ── Notable scoring ──
    // Higher score = more notable
    function notableScore(obs) {
      let score = 0;

      // Redlisted species dominate the ranking
      const rlCat = obs.taxon?.attributes?.redlistCategory || "";
      if (rlCat === "CR") score += 500;
      else if (rlCat === "EN") score += 300;
      else if (rlCat === "VU") score += 150;
      else if (rlCat === "NT") score += 80;
      else if (obs.taxon?.attributes?.isRedlisted) score += 100;

      // Phenology bonus for early arrivals
      score += phenologyBonus(obs).score;

      // Rare species
      const tid = String(obs.taxon?.id || "");
      const rar = rarityData[tid];
      if (rar) {
        if (rar.avg_per_year < 2) score += 120;
        else if (rar.avg_per_year < 5) score += 60;
        else score += 30;
      }

      // High count – secondary factor
      const count = getCount(obs);
      if (count >= 500) score += 15;
      else if (count >= 100) score += 10;
      else if (count >= 50) score += 7;
      else if (count >= 20) score += 4;

      // Remarks often indicate something unusual
      if (obs.occurrence?.occurrenceRemarks) score += 5;

      return score;
    }

    function redlistBadge(obs) {
      const cat = obs.taxon?.attributes?.redlistCategory;
      if (!cat || cat === "LC") return "";
      const colors = { CR: "red", EN: "red", VU: "orange", NT: "orange" };
      const labels = { CR: "Akut hotad", EN: "Starkt hotad", VU: "Sårbar", NT: "Nära hotad" };
      return `<span class="badge badge-${colors[cat] || "green"}">${labels[cat] || cat}</span>`;
    }

    function phenologyBadge(obs) {
      const ph = phenologyBonus(obs);
      if (!ph.label) return "";
      return `<span class="badge badge-blue">${ph.label}</span>`;
    }

    function rarityBadge(obs) {
      const tid = String(obs.taxon?.id || "");
      const r = rarityData[tid];
      if (!r) return "";
      if (r.avg_per_year < 2) return `<span class="badge badge-orange">Sällsynt · ${r.avg_per_year} obs/år</span>`;
      if (r.avg_per_year < 5) return `<span class="badge badge-green">Ovanlig · ${r.avg_per_year} obs/år</span>`;
      return `<span class="badge badge-green">Fåtalig · ${r.avg_per_year} obs/år</span>`;
    }

    function phenologyInfo(obs) {
      const tid = String(obs.taxon?.id || "");
      const ph = phenologyData[tid];
      if (!ph) return "";
      let info = `Normalt först ${ph.avg_first_date}`;
      if (ph.earliest_date) info += ` · Tidigast ${ph.earliest_date}${ph.earliest_year ? ` (${ph.earliest_year})` : ""}`;
      return `<div class="obs-meta" style="margin-top:0.3rem;color:#1d4ed8">&#x1f4c5; ${info}</div>`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr);
      const datePart = d.toLocaleDateString("sv-SE", { day: "numeric", month: "short" });
      const timePart = d.toLocaleTimeString("sv-SE", { hour: "2-digit", minute: "2-digit" });
      return timePart !== "00:00" ? `${datePart} ${timePart}` : datePart;
    }

    // ── Rendering ──
    let allObs = [];

    function renderList(observations) {
      const list = document.getElementById("obs-list");
      markers.clearLayers();

      if (!observations.length) {
        list.innerHTML = '<div class="loading">Inga observationer hittades.</div>';
        return;
      }

      list.innerHTML = observations.map((obs, i) => {
        const name = obs.taxon?.vernacularName || obs.taxon?.scientificName || "Okänd art";
        const sci = obs.taxon?.scientificName || "";
        const count = getCount(obs);
        const date = formatDate(obs.event?.startDate);
        const loc = obs.location?.locality || "";
        const observer = obs.occurrence?.recordedBy || "";
        const remarks = obs.occurrence?.occurrenceRemarks || "";
        const badge = redlistBadge(obs) + phenologyBadge(obs) + rarityBadge(obs);
        const score = notableScore(obs);
        const highlight = score >= 80 ? " highlight" : "";

        // Add map marker
        const lat = obs.location?.decimalLatitude;
        const lng = obs.location?.decimalLongitude;
        if (lat && lng) {
          const color = score >= 150 ? "#b91c1c" : score >= 80 ? "#b45309" : "#2d6a4f";
          const marker = L.circleMarker([lat, lng], {
            radius: Math.min(4 + (count || 1) * 0.02, 12),
            color: color,
            fillColor: color,
            fillOpacity: 0.7,
            weight: 1,
          }).bindPopup(`<strong>${name}</strong><br>${sci}<br>${count ? count + " ex" : ""}${date ? "<br>" + date : ""}${loc ? "<br>" + loc : ""}${observer ? "<br><small>" + observer + "</small>" : ""}`);
          marker.obsIndex = i;
          markers.addLayer(marker);
        }

        return `
          <div class="obs-card${highlight}" data-index="${i}" data-lat="${lat}" data-lng="${lng}">
            <div class="obs-header">
              <div>
                <div class="obs-species">${name} ${badge}</div>
                <div class="obs-scientific">${sci}</div>
              </div>
              ${count ? `<div class="obs-count">${count} ex</div>` : ""}
            </div>
            <div class="obs-meta">
              ${date ? `<span>${date}</span>` : ""}
              ${loc ? `<span>${loc}</span>` : ""}
              ${observer ? `<span>${observer}</span>` : ""}
            </div>
            ${remarks ? `<div class="obs-meta" style="margin-top:0.25rem;font-style:italic">Kommentar: ${remarks}</div>` : ""}
          </div>
        `;
      }).join("");

      // Click cards to fly to marker
      list.querySelectorAll(".obs-card").forEach(card => {
        card.addEventListener("click", () => {
          const lat = parseFloat(card.dataset.lat);
          const lng = parseFloat(card.dataset.lng);
          if (!isNaN(lat) && !isNaN(lng)) {
            map.flyTo([lat, lng], 14, { duration: 0.5 });
          }
        });
      });
    }

    // ── Grouped rendering for "Mest noterbara" ──
    function renderGrouped(observations) {
      const list = document.getElementById("obs-list");
      markers.clearLayers();

      if (!observations.length) {
        list.innerHTML = '<div class="loading">Inga observationer hittades.</div>';
        return;
      }

      // Group by species
      const groups = new Map();
      observations.forEach(obs => {
        const key = obs.taxon?.scientificName || "unknown";
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(obs);
      });

      // Sort groups by max notable score, then by total count
      const sortedGroups = [...groups.entries()].sort((a, b) => {
        const scoreA = Math.max(...a[1].map(notableScore));
        const scoreB = Math.max(...b[1].map(notableScore));
        if (scoreB !== scoreA) return scoreB - scoreA;
        const countA = a[1].reduce((s, o) => s + getCount(o), 0);
        const countB = b[1].reduce((s, o) => s + getCount(o), 0);
        return countB - countA;
      });

      // Add all markers
      observations.forEach((obs, i) => {
        const lat = obs.location?.decimalLatitude;
        const lng = obs.location?.decimalLongitude;
        if (lat && lng) {
          const score = notableScore(obs);
          const count = getCount(obs) || 1;
          const name = obs.taxon?.vernacularName || obs.taxon?.scientificName || "";
          const color = score >= 150 ? "#b91c1c" : score >= 80 ? "#b45309" : "#2d6a4f";
          L.circleMarker([lat, lng], {
            radius: Math.min(4 + count * 0.02, 12),
            color, fillColor: color, fillOpacity: 0.7, weight: 1,
          }).bindPopup(`<strong>${name}</strong><br>${obs.taxon?.scientificName || ""}<br>${count ? count + " ex" : ""}`)
            .addTo(markers);
        }
      });

      list.innerHTML = sortedGroups.map(([sci, obs], gi) => {
        const rep = obs[0];
        const name = rep.taxon?.vernacularName || sci;
        const pheno = phenologyBonus(rep);
        const badge = redlistBadge(rep) + phenologyBadge(rep) + rarityBadge(rep);
        const score = Math.max(...obs.map(notableScore));
        const highlight = score >= 80 ? " highlight" : "";
        const totalCount = obs.reduce((s, o) => s + getCount(o), 0);
        const obsCount = obs.length;
        const latestDate = formatDate(obs.sort((a, b) =>
          new Date(b.event?.startDate || 0) - new Date(a.event?.startDate || 0)
        )[0].event?.startDate);

        const detailCards = obs.map(o => {
          const date = formatDate(o.event?.startDate);
          const loc = o.location?.locality || "";
          const observer = o.occurrence?.recordedBy || "";
          const count = getCount(o);
          const remarks = o.occurrence?.occurrenceRemarks || "";
          const lat = o.location?.decimalLatitude;
          const lng = o.location?.decimalLongitude;
          return `<div class="obs-card" data-lat="${lat}" data-lng="${lng}">
            <div class="obs-header">
              <div class="obs-meta" style="margin:0">${date ? `<span>${date}</span>` : ""}${loc ? `<span>${loc}</span>` : ""}${observer ? `<span>${observer}</span>` : ""}</div>
              ${count ? `<div class="obs-count">${count} ex</div>` : ""}
            </div>
            ${remarks ? `<div class="obs-meta" style="font-style:italic">Kommentar: ${remarks}</div>` : ""}
          </div>`;
        }).join("");

        return `
          <div class="group-card${highlight}" data-group="${gi}">
            <div class="group-header">
              <div>
                <div class="obs-species">${name} ${badge}</div>
                <div class="obs-scientific">${sci}</div>
                <div class="obs-meta">${latestDate}${totalCount ? ` · totalt ${totalCount} ex` : ""}</div>
                ${pheno.label ? phenologyInfo(rep) : ""}
              </div>
              <div class="group-toggle">${obsCount} obs &#x25B6;</div>
            </div>
            <div class="group-details">${detailCards}</div>
          </div>
        `;
      }).join("");

      // Toggle expand/collapse
      list.querySelectorAll(".group-header").forEach(header => {
        header.addEventListener("click", () => {
          const details = header.nextElementSibling;
          const toggle = header.querySelector(".group-toggle");
          details.classList.toggle("open");
          toggle.innerHTML = details.classList.contains("open")
            ? toggle.innerHTML.replace("\u25B6", "\u25BC")
            : toggle.innerHTML.replace("\u25BC", "\u25B6");
        });
      });

      // Click detail cards to fly to marker
      list.querySelectorAll(".group-details .obs-card").forEach(card => {
        card.addEventListener("click", (e) => {
          e.stopPropagation();
          const lat = parseFloat(card.dataset.lat);
          const lng = parseFloat(card.dataset.lng);
          if (!isNaN(lat) && !isNaN(lng)) {
            map.flyTo([lat, lng], 14, { duration: 0.5 });
          }
        });
      });
    }

    // ── Sorting ──
    let currentSort = "recent";

    const sorters = {
      notable: (a, b) => notableScore(b) - notableScore(a),
      recent: (a, b) => new Date(b.event?.startDate || 0) - new Date(a.event?.startDate || 0),
      count: (a, b) => getCount(b) - getCount(a),
      species: (a, b) => (a.taxon?.vernacularName || "").localeCompare(b.taxon?.vernacularName || "", "sv"),
    };

    function applySort() {
      if (currentSort === "notable") {
        renderGrouped(allObs);
      } else {
        const sorted = [...allObs].sort(sorters[currentSort]);
        renderList(sorted);
      }
    }

    document.querySelectorAll(".controls button[data-sort]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".controls button[data-sort]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentSort = btn.dataset.sort;
        applySort();
      });
    });

    // ── Fetch data ──
    async function loadData() {
      try {
        // Fetch phenology data (once, then cached in variable)
        if (!Object.keys(phenologyData).length) {
          try {
            const phResp = await fetch(`stats-api.php?q=week_context&year=${new Date().getFullYear()}`);
            const ctx = await phResp.json();
            phenologyData = ctx.phenology || {};
            rarityData = ctx.rarity || {};
          } catch (e) { /* phenology & rarity are optional */ }
        }
        const resp = await fetch(`api.php?radius=${currentRadius}`);
        const data = await resp.json();

        if (data.error) {
          document.getElementById("obs-list").innerHTML =
            `<div class="error"><strong>API-fel:</strong> ${data.error}<br>${data.detail || ""}</div>`;
          return;
        }

        // data.records is the array in SOS API v1 response
        allObs = data.records || data || [];
        const uniqueSpecies = new Set(allObs.map(o => o.taxon?.scientificName)).size;
        document.getElementById("status").textContent =
          `${allObs.length} observationer från idag och igår · ${uniqueSpecies} arter`;

        applySort();
      } catch (err) {
        document.getElementById("obs-list").innerHTML =
          `<div class="error">Kunde inte hämta data: ${err.message}</div>`;
      }
    }

    // ── Radius selector ──
    document.querySelectorAll("#radius-controls button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("#radius-controls button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentRadius = parseInt(btn.dataset.radius);
        drawRadiusCircle(currentRadius);
        document.getElementById("header-desc").innerHTML =
          `Senaste observationerna inom ${currentRadius} km från Tåkern · Data från <a href="https://www.artportalen.se">Artportalen</a> m.fl. via <a href="https://www.artdatabanken.se">SLU Artdatabanken</a>`;
        document.getElementById("status").textContent = "Laddar...";
        document.getElementById("obs-list").innerHTML = '<div class="loading">Hämtar observationer...</div>';
        loadData();
      });
    });

    // ── Reload button ──
    document.getElementById("reload-btn").addEventListener("click", () => {
      document.getElementById("status").textContent = "Uppdaterar...";
      document.getElementById("obs-list").innerHTML = '<div class="loading">Hämtar observationer...</div>';
      loadData();
    });

    loadData();
  </script>
</body>
</html>
