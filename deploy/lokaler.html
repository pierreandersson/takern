<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tåkern – Lokaler</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#2d6a4f">
  <meta name="description" content="Lokaler vid Tåkern – de mest rapporterade fågellokalerna med artlistor och statistik.">
  <meta property="og:title" content="Tåkern – Lokaler">
  <meta property="og:description" content="Lokaler vid Tåkern – de mest rapporterade fågellokalerna med artlistor och statistik.">
  <meta property="og:image" content="https://pierrea.se/takern/og-image.jpg">
  <meta property="og:url" content="https://pierrea.se/takern/lokaler.html">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="sv_SE">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    /* Locality list */
    .locality-list-page {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .loc-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .loc-item:hover { border-color: var(--accent); }
    .loc-item .name { font-weight: 600; }
    .loc-item .meta { color: var(--muted); font-size: 0.85rem; white-space: nowrap; }

    .list-title {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    /* Detail view */
    .locality-detail { display: none; }
    .locality-detail.active { display: block; }

    .locality-header {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .locality-header h2 { font-size: 1.5rem; font-weight: 700; }

    .locality-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }

    .stat-card .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .stat-card .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }

    /* Map section with nearby */
    .map-section {
      margin-bottom: 1.5rem;
    }
    #localityMap {
      height: 300px;
      border-radius: 8px 8px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
    }
    .nearby-bar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0 0 8px 8px;
      padding: 0.5rem 0.75rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem;
    }
    .nearby-bar .nearby-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 600;
      margin-right: 0.2rem;
    }
    .nearby-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      transition: border-color 0.15s;
      font-size: 0.75rem;
      white-space: nowrap;
    }
    .nearby-chip:hover { border-color: var(--accent); }
    .nearby-chip .dist { color: var(--muted); margin-left: 0.25rem; }

    .recent-reports {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 2rem;
    }

    @media (max-width: 600px) {
      .locality-stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <div>
        <h1><a href="index.html">Fågelobservationer vid Tåkern</a></h1>
        <p id="header-desc">Lokaler vid Tåkern</p>
      </div>
    </div>
    <div class="nav-bar">
      <span class="current-page">Lokaler</span>
      <button class="hamburger" aria-label="Meny">&#9776;</button>
    </div>
    <nav>
      <a href="index.html">Senaste</a>
      <a href="veckorapport.html">Denna vecka</a>
      <a href="arter.html">Arter</a>
      <a href="lokaler.html" class="active" id="nav-lokaler">Lokaler</a>
      <a href="statistik.html">Statistik</a>
      <a href="om.html">Om</a>
    </nav>
  </header>

  <nav class="section-nav" id="section-nav"></nav>

  <div class="container">
    <!-- Search -->
    <div class="search-box">
      <input type="text" id="locality-search" placeholder="Sök lokal..." autocomplete="off">
      <div class="search-results" id="search-results"></div>
    </div>

    <!-- Browse view -->
    <div id="browse-view">
      <div id="sec-browse-karta" style="scroll-margin-top:3rem">
        <div id="browse-map" style="height:450px;border-radius:10px;border:1px solid var(--border);margin-bottom:1.5rem"></div>
      </div>
      <div id="sec-browse-lokaler" style="scroll-margin-top:3rem">
        <div id="locality-list-container">
          <div class="loading">Laddar lokaler...</div>
        </div>
      </div>
    </div>

    <!-- Detail view (hidden until selected) -->
    <div class="locality-detail" id="locality-detail"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="utils.js"></script>
  <script>
    // ── State ──
    let localitiesCache = null;
    let currentChart = null;
    let currentMap = null;
    let browseMap = null;

    function findLocalityBySlug(slug) {
      if (!localitiesCache) return null;
      return localitiesCache.find(l => toSlug(l.name) === slug);
    }

    // ── Section navigation ──
    const DETAIL_SECTIONS = [
      { id: "sec-karta", label: "Karta" },
      { id: "sec-senaste", label: "Senaste" },
      { id: "sec-sasong", label: "Säsong" },
      { id: "sec-arter", label: "Arter" },
      { id: "sec-rapportorer", label: "Rapportörer" },
    ];

    const BROWSE_SECTIONS = [
      { id: "sec-browse-karta", label: "Karta" },
      { id: "sec-browse-lokaler", label: "Lokaler" },
    ];

    // ── Render browse view ──
    function renderBrowseView() {
      if (!localitiesCache) return;
      const container = document.getElementById("locality-list-container");
      const top = localitiesCache.slice(0, 10);
      container.innerHTML = `
        <div class="list-title">Lokaler med flest rapporter under de senaste 12 månaderna</div>
        <div class="locality-list-page">
          ${top.map(l => `
            <div class="loc-item" data-name="${l.name}">
              <span class="name">${l.name}</span>
              <span class="meta">${(l.recent_obs || l.obs).toLocaleString("sv")} obs senaste året · ${l.species} arter</span>
            </div>
          `).join("")}
        </div>
      `;

      container.querySelectorAll(".loc-item").forEach(el => {
        el.addEventListener("click", () => {
          loadLocality(el.dataset.name);
        });
      });

      // Section nav for browse
      updateSectionNav(BROWSE_SECTIONS);

      // Initialize browse map with all localities
      if (!browseMap) {
        browseMap = initMap("browse-map", 11);
        const withCoords = localitiesCache.filter(l => l.lat && l.lng);
        withCoords.forEach(l => {
          const r = Math.min(8, Math.max(3, Math.sqrt(l.obs / 50)));
          const marker = L.circleMarker([l.lat, l.lng], {
            radius: r,
            fillColor: "#2d6a4f",
            color: "#1b4332",
            weight: 1,
            fillOpacity: 0.7,
          }).addTo(browseMap);
          marker.bindPopup(`<strong><a href="#" class="browse-map-link" data-name="${l.name}" style="color:var(--accent);text-decoration:none">${l.name}</a></strong><br>${l.obs.toLocaleString("sv")} obs · ${l.species} arter`);
          marker.on("click", () => marker.openPopup());
        });

        // Delegated click handler for popup links
        browseMap.getContainer().addEventListener("click", e => {
          const link = e.target.closest(".browse-map-link");
          if (link) {
            e.preventDefault();
            loadLocality(link.dataset.name);
          }
        });
      }
    }

    // ── Search ──
    function setupSearch() {
      const input = document.getElementById("locality-search");
      const results = document.getElementById("search-results");

      input.addEventListener("input", () => {
        const q = input.value.trim().toLowerCase();
        if (q.length < 2) {
          results.classList.remove("open");
          return;
        }

        const matches = localitiesCache
          .filter(l => l.name.toLowerCase().includes(q))
          .slice(0, 15);

        if (matches.length === 0) {
          results.innerHTML = '<div style="padding:0.75rem 1rem;color:var(--muted)">Inga lokaler hittade</div>';
        } else {
          results.innerHTML = matches.map(l => `
            <div class="search-result" data-name="${l.name}">
              <span class="name">${l.name}</span>
              <span class="count">${l.obs.toLocaleString("sv")} obs</span>
            </div>
          `).join("");
        }

        results.classList.add("open");

        results.querySelectorAll(".search-result").forEach(el => {
          el.addEventListener("click", () => {
            results.classList.remove("open");
            input.value = "";
            loadLocality(el.dataset.name);
          });
        });
      });

      document.addEventListener("click", (e) => {
        if (!e.target.closest(".search-box")) {
          results.classList.remove("open");
        }
      });
    }

    // ── Show browse view ──
    function showBrowse() {
      const detail = document.getElementById("locality-detail");
      detail.classList.remove("active");
      detail.innerHTML = "";
      document.getElementById("browse-view").style.display = "";
      document.getElementById("locality-search").value = "";
      if (currentChart) { currentChart.destroy(); currentChart = null; }
      if (currentMap) { currentMap.remove(); currentMap = null; }
      if (browseMap) setTimeout(() => browseMap.invalidateSize(), 50);
      updateSectionNav(BROWSE_SECTIONS);
      document.title = "Tåkern – Lokaler";
      document.getElementById("header-desc").textContent = "Lokaler vid Tåkern";
      history.pushState({}, "", "lokaler.html");
    }

    // ── Load and show locality detail ──
    // Live data cache with 2-minute TTL
    let liveDataCache = { data: null, ts: 0 };
    const LIVE_CACHE_TTL = 2 * 60 * 1000;

    function localityHasRecentObs(name) {
      if (!localitiesCache) return true; // assume yes if we don't know
      const loc = localitiesCache.find(l => l.name === name);
      if (!loc) return true;
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - 3);
      return loc.last_obs >= cutoff.toISOString().substring(0, 10);
    }

    async function fetchLiveData() {
      const now = Date.now();
      if (liveDataCache.data && (now - liveDataCache.ts) < LIVE_CACHE_TTL) {
        return liveDataCache.data;
      }
      const resp = await fetch(`api.php?days=3`);
      const data = await resp.json();
      liveDataCache = { data, ts: Date.now() };
      return data;
    }

    async function loadLocality(name) {
      const slug = toSlug(name);
      history.pushState({ locality: name }, "", `lokaler.html?lokal=${slug}`);
      document.title = `${name} – Tåkern`;
      document.getElementById("header-desc").textContent = name;
      document.getElementById("browse-view").style.display = "none";

      const detail = document.getElementById("locality-detail");
      detail.classList.add("active");
      detail.innerHTML = '<div class="loading">Laddar lokaldata...</div>';

      if (currentChart) { currentChart.destroy(); currentChart = null; }
      if (currentMap) { currentMap.remove(); currentMap = null; }

      try {
        const needsLive = localityHasRecentObs(name);

        // Fetch locality stats (always) and live observations (only if recent activity)
        const statsPromise = fetch(`stats-api.php?q=locality&name=${encodeURIComponent(name)}`);
        const livePromise = needsLive ? fetchLiveData() : Promise.resolve(null);

        const [statsResp, liveData] = await Promise.all([statsPromise, livePromise]);
        const data = await statsResp.json();

        if (data.error) {
          detail.innerHTML = `<div class="error">${data.error}</div>`;
          return;
        }

        // Merge live data with database reports (live takes priority for recent days)
        if (liveData && liveData.records) {
          const liveReports = liveData.records
            .filter(r => (r.location?.locality || "") === name)
            .map(r => {
              const startDate = r.event?.startDate || "";
              const date = startDate.substring(0, 10);
              const time = startDate.length > 10 ? startDate.substring(11, 16) : "";
              const occId = r.occurrence?.occurrenceId || "";
              const occMatch = occId.match(/:sighting:(\d+)$/);
              const url = occMatch ? `https://www.artportalen.se/sighting/${occMatch[1]}` : "";
              return {
                taxon_id: r.taxon?.id,
                name: r.taxon?.vernacularName || "",
                scientific: r.taxon?.scientificName || "",
                date,
                time: time !== "00:00" ? time : "",
                count: r.occurrence?.individualCount,
                observer: r.occurrence?.recordedBy || "",
                url,
                _live: true,
              };
            });
          // Merge: live reports + older database reports, dedup by date|species
          const dbReports = (data.recent_reports || []).map(r => ({ ...r, _live: false }));
          const merged = [...liveReports, ...dbReports];
          merged.sort((a, b) => (b.date || "").localeCompare(a.date || "") || (b.time || "").localeCompare(a.time || ""));
          const seen = new Set();
          data.recent_reports = merged.filter(r => {
            const key = `${r.date}|${r.name}`;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          }).slice(0, 20);
        }

        renderLocalityDetail(data);
      } catch (err) {
        detail.innerHTML = `<div class="error">Kunde inte ladda data: ${err.message}</div>`;
      }
    }

    function weekToDate(week) {
      const d = new Date(2024, 0, 1);
      d.setDate(d.getDate() + week * 7);
      return `${d.getDate()} ${MONTHS_SV[d.getMonth()]}`;
    }

    function getNearbyLocalities(name, lat, lng, count) {
      if (!localitiesCache) return [];
      const R = 6371;
      const toRad = d => d * Math.PI / 180;
      return localitiesCache
        .filter(l => l.name !== name && l.lat && l.lng)
        .map(l => {
          const dLat = toRad(l.lat - lat);
          const dLng = toRad(l.lng - lng);
          const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat)) * Math.cos(toRad(l.lat)) * Math.sin(dLng / 2) ** 2;
          const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
          const distStr = dist < 1 ? `${Math.round(dist * 1000)} m` : `${dist.toFixed(1)} km`;
          return { ...l, dist, distStr };
        })
        .sort((a, b) => a.dist - b.dist)
        .slice(0, count);
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr);
      return `${d.getDate()} ${MONTHS_SV[d.getMonth()]} ${d.getFullYear()}`;
    }

    function renderLocalityDetail(data) {
      const detail = document.getElementById("locality-detail");
      let html = "";

      // Back link
      html += `<div style="margin-bottom:1rem">
        <a href="#" id="back-link" style="color:var(--accent);text-decoration:none;font-size:0.9rem">&larr; Alla lokaler</a>
      </div>`;

      // Header
      html += `<div class="locality-header">
        <h2>${data.name}</h2>
      </div>`;

      // Stats cards (above map)
      html += `<div class="locality-stats">
        <div class="stat-card"><div class="stat-value">${data.last_obs ? formatDate(data.last_obs) : "–"}</div><div class="stat-label">Senaste obs</div></div>
        <div class="stat-card"><div class="stat-value">${data.obs_count.toLocaleString("sv")}</div><div class="stat-label">observationer sedan ${data.first_obs ? data.first_obs.substring(0, 4) : "–"}</div></div>
        <div class="stat-card"><div class="stat-value">${data.species_count}</div><div class="stat-label">olika arter rapporterade</div></div>
        <div class="stat-card"><div class="stat-value">${data.observer_count}</div><div class="stat-label">Rapportörer</div></div>
      </div>`;

      // Map + nearby localities bar
      if (data.lat && data.lng) {
        const nearby = getNearbyLocalities(data.name, data.lat, data.lng, 8);
        html += `<div class="map-section" id="sec-karta">
          <div id="localityMap"></div>
          ${nearby.length > 0 ? `<div class="nearby-bar">
            <span class="nearby-label">Närliggande:</span>
            ${nearby.map(n => `
              <div class="nearby-chip" data-nearby-name="${n.name}">
                ${n.name}<span class="dist">${n.distStr}</span>
              </div>
            `).join("")}
          </div>` : ''}
        </div>`;
      }

      // Recent reports
      if (data.recent_reports && data.recent_reports.length > 0) {
        html += `<div class="section-title" id="sec-senaste">De senaste rapporterna från lokalen</div>
        <div class="recent-reports">
          ${data.recent_reports.map(r =>
            renderObsItem(normalizeDbObs(r), { showSpeciesLink: true, showLocalityLink: false })
          ).join("")}
        </div>`;
      }

      // Season curve
      if (data.season_curve && Object.keys(data.season_curve).length > 0) {
        html += `<div class="chart-section" id="sec-sasong">
          <h2>Säsongsvariation</h2>
          <p style="font-size:0.85rem;color:var(--muted);margin-bottom:0.75rem">Genomsnittligt antal rapporter per vecka</p>
          <div class="chart-container"><canvas id="seasonChart"></canvas></div>
        </div>`;
      }

      // Top species
      if (data.top_species && data.top_species.length > 0) {
        html += `<div class="section-title" id="sec-arter">Mest rapporterade arter</div>
        <div class="top-list">
          ${data.top_species.map(s =>
            renderSpeciesItem(s, { showLink: true, showCount: true, countLabel: "obs" })
          ).join("")}
        </div>`;
      }

      // Top reporters
      if (data.top_reporters && data.top_reporters.length > 0) {
        html += `<div class="chart-section" id="sec-rapportorer">
          <h2>Mest aktiva rapportörer</h2>
          <div class="top-list">
            ${data.top_reporters.map(r => renderReporterItem(r)).join("")}
          </div>
        </div>`;
      }

      // Footer
      html += `<footer>
        Data från <a href="https://www.artportalen.se">Artportalen</a>, Ringmärkningscentralen, Svensk Fågeltaxering m.fl. via <a href="https://www.artdatabanken.se">SLU Artdatabanken</a>
      </footer>`;

      detail.innerHTML = html;

      // Back link handler
      document.getElementById("back-link").addEventListener("click", e => {
        e.preventDefault();
        showBrowse();
      });

      // Map with nearby localities
      if (data.lat && data.lng) {
        currentMap = L.map("localityMap").setView([data.lat, data.lng], 14);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
          maxZoom: 18,
        }).addTo(currentMap);
        addRadiusCircle(currentMap);
        L.marker([data.lat, data.lng]).addTo(currentMap)
          .bindPopup(`<strong>${data.name}</strong>`).openPopup();

        // Add nearby localities as subtle markers
        const nearby = getNearbyLocalities(data.name, data.lat, data.lng, 8);
        nearby.forEach(n => {
          L.circleMarker([n.lat, n.lng], {
            radius: 5, fillColor: "#6b7280", color: "#4b5563", weight: 1, fillOpacity: 0.5,
          }).addTo(currentMap).bindPopup(`<strong>${n.name}</strong><br>${n.distStr}`);
        });
      }

      // Season chart
      if (data.season_curve && Object.keys(data.season_curve).length > 0) {
        const weeks = Array.from({ length: 53 }, (_, i) => i);
        const vals = weeks.map(w => data.season_curve[w] || 0);
        const labels = weeks.map(w => weekToDate(w));

        currentChart = new Chart(document.getElementById("seasonChart"), {
          type: "line",
          data: {
            labels: labels,
            datasets: [{
              label: "Snitt rapporter",
              data: vals,
              backgroundColor: "rgba(45, 106, 79, 0.1)",
              borderColor: "#2d6a4f",
              borderWidth: 2,
              fill: true,
              tension: 0.3,
              pointRadius: 0,
              pointHoverRadius: 4,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { maxTicksLimit: 12 } },
              y: { beginAtZero: true, grid: { color: "rgba(0,0,0,0.05)" } },
            },
          },
        });
      }

      // Wire up species clicks → navigate to arter.html
      detail.querySelectorAll("[data-taxon]").forEach(el => {
        el.addEventListener("click", () => {
          const name = el.dataset.name || el.querySelector(".name")?.textContent;
          if (name) {
            window.location.href = `arter.html?art=${toSlug(name)}`;
          }
        });
      });

      // Wire up nearby locality clicks
      detail.querySelectorAll("[data-nearby-name]").forEach(el => {
        el.addEventListener("click", () => {
          loadLocality(el.dataset.nearbyName);
        });
      });

      // Section nav
      updateSectionNav(DETAIL_SECTIONS.filter(s => document.getElementById(s.id)));
    }

    // ── Browser back/forward ──
    window.addEventListener("popstate", () => {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("lokal");
      if (slug && localitiesCache) {
        const loc = findLocalityBySlug(slug);
        if (loc) {
          loadLocality(loc.name);
          return;
        }
      }
      showBrowse();
    });

    // ── Init ──
    async function init() {
      try {
        const resp = await fetch("stats-api.php?q=localities");
        const data = await resp.json();
        localitiesCache = data.localities || [];

        renderBrowseView();
        setupSearch();

        // Check for deep-link
        const params = new URLSearchParams(window.location.search);
        const slug = params.get("lokal");
        if (slug) {
          const loc = findLocalityBySlug(slug);
          if (loc) {
            loadLocality(loc.name);
          }
        }
      } catch (err) {
        document.getElementById("locality-list-container").innerHTML =
          `<div class="error">Kunde inte ladda lokaler: ${err.message}</div>`;
      }
    }
    init();
  </script>
</body>
</html>
