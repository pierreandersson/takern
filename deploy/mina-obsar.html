<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mina rapporter – Fåglar runt Tåkern</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#2d6a4f">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .hero {
      position: relative;
      height: 220px;
      overflow: hidden;
    }
    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 60%;
      display: block;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 55%;
      background: linear-gradient(transparent, rgba(0,0,0,0.55));
      pointer-events: none;
    }
    .hero-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1;
    }
    .hero-overlay-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 1rem 1.25rem;
    }
    .hero-overlay h1 {
      padding-left: 8px; /* optisk justering mot kortkanter */
      font-size: 1.4rem;
      font-weight: 600;
      margin: 0 0 0.15rem;
      color: white;
    }
    .hero-overlay .subtitle {
      padding-left: 8px; /* optisk justering mot kortkanter */
      font-size: 0.85rem;
      color: rgba(255,255,255,0.8);
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      text-align: center;
    }
    .stat-card .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); line-height: 1.1; }
    .stat-card .stat-value.sm { font-size: 1.15rem; }
    .stat-card .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }

    /* Two-column layout */
    .main-layout {
      display: grid;
      grid-template-columns: 308px 1fr;
      gap: 1.75rem;
      align-items: start;
    }

    /* Left sidebar */
    .sidebar h2 { font-size: 0.9rem; font-weight: 600; margin: 0 0 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

    /* Flatpickr overrides */
    .flatpickr-calendar.inline {
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: none;
      background: var(--card);
      font-family: inherit;
      font-size: 0.85rem;
      margin-bottom: 0;
      top: 0;
      width: 100%;
    }
    .flatpickr-months { background: var(--card); border-radius: 8px 8px 0 0; padding: 0.25rem 0; }
    .flatpickr-months .flatpickr-month { background: var(--card); color: var(--text); }
    .flatpickr-current-month { color: var(--text); font-size: 0.95rem; }
    .flatpickr-current-month .flatpickr-monthDropdown-months { background: var(--card); color: var(--text); }
    .flatpickr-current-month input.cur-year { color: var(--text); }
    .flatpickr-months .flatpickr-prev-month,
    .flatpickr-months .flatpickr-next-month { color: var(--muted); fill: var(--muted); }
    .flatpickr-months .flatpickr-prev-month:hover,
    .flatpickr-months .flatpickr-next-month:hover { color: var(--accent); fill: var(--accent); }
    .flatpickr-weekdays { background: var(--card); }
    span.flatpickr-weekday { background: var(--card); color: var(--muted); font-size: 0.75rem; }
    .flatpickr-day { color: var(--text); border-radius: 50%; position: relative; }
    .flatpickr-day:hover { background: var(--accent-bg); border-color: var(--border); }
    .flatpickr-day.selected,
    .flatpickr-day.selected:hover,
    .flatpickr-day.selected:focus { background: var(--accent); border-color: var(--accent); color: white; }
    .flatpickr-day.today { border-color: var(--border); }
    .flatpickr-day.today:not(.selected) { font-weight: 600; }
    .flatpickr-day.flatpickr-disabled,
    .flatpickr-day.flatpickr-disabled:hover { color: var(--border); }
    .flatpickr-innerContainer { border-color: var(--border); }
    .flatpickr-day.has-obs { font-weight: 600; }
    .flatpickr-day.has-obs::after {
      content: '';
      position: absolute;
      bottom: 3px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }
    .flatpickr-day.has-obs.selected::after { background: rgba(255,255,255,0.7); }

    /* Year links */
    .year-links {
      margin-top: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .year-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s;
      width: 100%;
      text-align: left;
    }
    .year-link:hover { border-color: var(--accent); }
    .year-link.active { border-color: var(--accent); background: var(--accent-bg); }
    .year-link .yl-year { font-weight: 600; }
    .year-link .yl-count { font-size: 0.78rem; color: var(--muted); }
    .year-link.active .yl-count { color: var(--accent); }

    /* Right column: diary */
    .diary-col h2 { font-size: 0.9rem; font-weight: 600; margin: 0 0 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

    .diary { display: flex; flex-direction: column; gap: 1rem; }
    .diary-day {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      background: var(--card);
    }
    .diary-day-header {
      padding: 0.4rem 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      background: var(--accent-bg);
      border-bottom: 1px solid var(--border);
    }
    .diary-day-date { font-weight: 600; font-size: 0.82rem; }
    .diary-day-summary { font-size: 0.72rem; color: var(--muted); }

    .diary-locality-group {
      background: var(--bg);
      border-radius: 6px;
      margin: 0.35rem 0.5rem;
      overflow: hidden;
    }
    .diary-locality-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.35rem 0.6rem;
      background: var(--accent-bg);
      font-size: 0.78rem;
      color: var(--accent);
      letter-spacing: 0.02em;
    }
    .diary-locality-name { font-weight: 600; text-transform: uppercase; font-size: 0.72rem; }
    .diary-locality-name a { color: inherit; text-decoration: none; }
    .diary-locality-name a:hover { text-decoration: underline; }
    .diary-locality-time { font-size: 0.7rem; font-weight: 400; text-transform: none; }
    .diary-locality-count { font-size: 0.7rem; }

    .diary-obs-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 0.3rem 0.75rem;
      padding: 0.3rem 0.6rem;
      align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      font-size: 0.82rem;
    }
    .diary-locality-group .diary-obs-row:last-child { border-bottom: none; }
    .diary-obs-row:hover { background: var(--bg); }
    .diary-obs-species { font-weight: 500; }
    .diary-obs-species a { color: var(--text); text-decoration: none; }
    .diary-obs-species a:hover { color: var(--accent); }
    .diary-obs-count { color: var(--muted); white-space: nowrap; }
    .diary-obs-link a {
      font-size: 0.72rem; color: var(--accent); text-decoration: none;
      border: 1px solid currentColor; border-radius: 4px;
      padding: 0.08rem 0.35rem; white-space: nowrap;
      opacity: 0.6; transition: opacity 0.15s;
    }
    .diary-obs-link a:hover { opacity: 1; }
    .diary-remarks { grid-column: 1 / -1; font-size: 0.76rem; color: var(--muted); font-style: italic; display: none; }
    .has-remarks .diary-remarks { display: block; }
    .diary-empty { font-size: 0.88rem; color: var(--muted); padding: 2rem 0; text-align: center; }

    /* Map section */
    #my-map { height: 350px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 2rem; }

    /* Top localities */
    .top-localities { display: flex; flex-direction: column; gap: 0.3rem; }

    section.full-width { margin-bottom: 2.5rem; }
    section.full-width h2 { font-size: 0.9rem; font-weight: 600; margin: 0 0 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

    /* Skeleton loading */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, rgba(0,0,0,0.04) 50%, var(--border) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 6px;
    }
    .skeleton-text { height: 0.9rem; margin-bottom: 0.5rem; border-radius: 4px; }
    .skeleton-text.short { width: 40%; }
    .skeleton-text.medium { width: 65%; }
    .skeleton-text.long { width: 85%; }
    .stat-card .skeleton-value { height: 1.5rem; width: 50%; margin: 0 auto 0.4rem; }
    .stat-card .skeleton-label { height: 0.7rem; width: 70%; margin: 0 auto; }
    .skeleton-diary-day {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      background: var(--card);
      padding: 0.75rem;
    }
    .skeleton-chart { height: 200px; border-radius: 8px; }

    @media (max-width: 700px) {
      .main-layout { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .diary-locality-header { padding: 0.25rem 0.6rem; }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/sv.js"></script>
  <script src="utils.js"></script>
  <script>
    const REPORTER = 'Pierre Andersson';
    const MONTHS_FULL = ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'];
    const WEEKDAYS    = ['söndag','måndag','tisdag','onsdag','torsdag','fredag','lördag'];

    let allObs = [];
    let dateCounts = {};
    let activeYear  = null;   // null = alla år
    let selectedDate = null;  // null = ingen specifik dag
    let fp = null;

    function fmtKey(d) {
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    function diaryDate(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return `${WEEKDAYS[d.getDay()].charAt(0).toUpperCase() + WEEKDAYS[d.getDay()].slice(1)} ${d.getDate()} ${MONTHS_FULL[d.getMonth()]} ${d.getFullYear()}`;
    }

    function shortLoc(loc) {
      return loc ? loc.replace(/, Tåkern,?\s*Ög$/, '').replace(/, Tåkern$/, '') : '';
    }

    async function load() {
      const [dbRes, liveRes] = await Promise.all([
        fetch(`stats-api.php?q=reporter&name=${encodeURIComponent(REPORTER)}`),
        fetch('api.php?days=1').catch(() => null)
      ]);
      const data = await dbRes.json();
      if (data.error) { document.getElementById('diary').textContent = 'Fel: ' + data.error; return; }

      allObs = data.observations || [];

      // Supplement with live SOS-API observations for today+yesterday
      if (liveRes && liveRes.ok) {
        try {
          const liveData = await liveRes.json();
          const liveRecords = liveData.records || liveData || [];
          const dbUrls = new Set(allObs.filter(o => o.url).map(o => o.url));
          for (const rec of liveRecords) {
            const observer = rec.occurrence?.recordedBy || '';
            if (!observer.includes(REPORTER)) continue;
            const n = normalizeSosObs(rec);
            // Build URL for dedup check
            if (n.url && dbUrls.has(n.url)) continue;
            allObs.push({
              taxon_id: n.taxonId,
              name: n.name,
              scientific: n.scientific,
              count: n.count,
              date: n.date,
              time: n.time,
              locality: n.locality,
              url: n.url,
              remarks: n.remarks,
              redlist: n.redlist,
            });
            data.total_obs++;
          }
          // Re-sort by date+time descending
          allObs.sort((a, b) => (b.date + (b.time || '')).localeCompare(a.date + (a.time || '')));
          // Recalculate species count
          data.total_species = new Set(allObs.map(o => o.taxon_id || o.name)).size;
          // Recalculate per_year
          data.per_year = {};
          for (const o of allObs) {
            const y = o.date.substring(0, 4);
            data.per_year[y] = (data.per_year[y] || 0) + 1;
          }
          // Update obs_this_year and species_this_year from recalculated per_year
          const cy = String(new Date().getFullYear());
          data.obs_this_year = data.per_year[cy] || 0;
          data.species_this_year = new Set(allObs.filter(o => o.date.startsWith(cy)).map(o => o.taxon_id || o.name)).size;

          // Supplement top observers with today's live data
          const today = new Date().toISOString().substring(0, 10);
          const liveCounts = {};
          for (const rec of liveRecords) {
            const d = rec.event?.startDate?.substring(0, 10) || '';
            if (d !== today) continue;
            const name = rec.occurrence?.recordedBy || '';
            if (!name) continue;
            liveCounts[name] = (liveCounts[name] || 0) + 1;
          }
          if (Object.keys(liveCounts).length && data.top_observers_this_year) {
            const obsMap = {};
            for (const o of data.top_observers_this_year) obsMap[o.name] = o.count;
            for (const [name, cnt] of Object.entries(liveCounts)) {
              obsMap[name] = (obsMap[name] || 0) + cnt;
            }
            const sorted = Object.entries(obsMap)
              .map(([name, count]) => ({ name, count }))
              .sort((a, b) => b.count - a.count);
            // Update rank and obs count for REPORTER
            const myCount = obsMap[REPORTER] || 0;
            if (myCount > 0) {
              data.rank_this_year = sorted.findIndex(o => o.name === REPORTER) + 1;
              data.obs_this_year = myCount;
            }
            data.top_observers_this_year = sorted.slice(0, 20);
          }
        } catch(e) { /* live fetch failed, continue with DB data only */ }
      }

      for (const obs of allObs) {
        const d = obs.date.substring(0, 10);
        dateCounts[d] = (dateCounts[d] || 0) + 1;
      }

      // Default to most recent observation date
      if (allObs.length) {
        selectedDate = allObs[0].date.substring(0, 10);
      }

      const cyInit = String(new Date().getFullYear());
      data.species_this_year = new Set(allObs.filter(o => o.date.startsWith(cyInit)).map(o => o.taxon_id || o.name)).size;

      renderStats(data);
      renderYearLinks(data.per_year);
      initFlatpickr();
      updateDiaryHeading();
      renderMap(data.top_localities || []);
      renderTopLocalities(data.top_localities || []);
      renderDiary();
      renderWeekdayChart();
      renderHourChart();
      renderMonthChart();
      renderTopObservers(data.top_observers_this_year || [], data.rank_year || new Date().getFullYear());
    }

    function renderStats(data) {
      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card">
          <div class="stat-value">${data.obs_this_year || 0}</div>
          <div class="stat-label">observationer i år</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${data.species_this_year || 0}</div>
          <div class="stat-label">arter i år</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${data.total_species}</div>
          <div class="stat-label">arter totalt</div>
        </div>
        <div class="stat-card">
          <div class="stat-value sm">${data.obs_this_year > 0 ? '#' + data.rank_this_year : '–'}</div>
          <div class="stat-label">av ${data.total_observers_this_year.toLocaleString('sv')} i år</div>
        </div>`;
    }

    function renderYearLinks(perYear) {
      const el = document.getElementById('year-links');
      const entries = Object.entries(perYear).sort(([a], [b]) => b - a);
      el.innerHTML = entries.map(([y, n]) =>
        `<button class="year-link${activeYear === y ? ' active' : ''}" data-year="${y}">
          <span class="yl-year">${y}</span>
          <span class="yl-count">${n} obs</span>
        </button>`
      ).join('');

      el.querySelectorAll('.year-link').forEach(btn => {
        btn.addEventListener('click', () => {
          const y = btn.dataset.year;
          if (activeYear === y) {
            activeYear = null; // toggle off = alla år
          } else {
            activeYear = y;
          }
          selectedDate = null;
          fp.clear();
          // Jump calendar to most recent date in that year (or current date if all)
          if (activeYear) {
            const dates = Object.keys(dateCounts).filter(d => d.startsWith(activeYear)).sort();
            if (dates.length) fp.jumpToDate(dates[dates.length - 1]);
          }
          renderYearLinks(Object.fromEntries(entries));
          updateDiaryHeading();
          renderDiary();
        });
      });
    }

    function updateDiaryHeading() {
      const el = document.getElementById('diary-heading');
      if (selectedDate) {
        const d = new Date(selectedDate + 'T12:00:00');
        el.textContent = `${d.getDate()} ${MONTHS_FULL[d.getMonth()]} ${d.getFullYear()}`;
      } else if (activeYear) {
        el.textContent = `${activeYear}`;
      } else {
        el.textContent = 'Alla rapporter';
      }
    }

    function initFlatpickr() {
      const mostRecent = allObs.length ? allObs[0].date.substring(0, 10) : new Date().toISOString().substring(0, 10);

      fp = flatpickr('#fp-input', {
        inline: true,
        locale: 'sv',
        defaultDate: mostRecent,
        onDayCreate(dObj, dStr, fp, dayElem) {
          if (dateCounts[fmtKey(dayElem.dateObj)]) {
            dayElem.classList.add('has-obs');
          }
        },
        onChange(dates) {
          if (!dates.length) { selectedDate = null; updateDiaryHeading(); renderDiary(); return; }
          const key = fmtKey(dates[0]);
          if (selectedDate === key) {
            selectedDate = null;
            fp.clear();
          } else {
            selectedDate = key;
            activeYear = null;
            renderYearLinks(
              Object.fromEntries(
                Object.entries(
                  allObs.reduce((acc, o) => {
                    const y = o.date.substring(0,4);
                    acc[y] = (acc[y]||0)+1; return acc;
                  }, {})
                ).sort(([a],[b]) => b-a)
              )
            );
            updateDiaryHeading();
            renderDiary();
          }
        }
      });
    }

    function renderDiary() {
      let filtered;
      if (selectedDate) {
        filtered = allObs.filter(o => o.date.substring(0, 10) === selectedDate);
      } else if (activeYear) {
        filtered = allObs.filter(o => o.date.substring(0, 4) === activeYear);
      } else {
        filtered = allObs;
      }

      if (!filtered.length) {
        document.getElementById('diary').innerHTML = '<div class="diary-empty">Inga observationer.</div>';
        return;
      }

      const byDate = {};
      for (const obs of filtered) {
        const d = obs.date.substring(0, 10);
        if (!byDate[d]) byDate[d] = [];
        byDate[d].push(obs);
      }

      document.getElementById('diary').innerHTML = Object.entries(byDate).map(([date, obs]) => {
        const artCount = new Set(obs.map(o => o.taxon_id)).size;
        const locCount = new Set(obs.map(o => o.locality || '')).size;
        const summary = `${obs.length} obs · ${artCount} art${artCount !== 1 ? 'er' : ''} · ${locCount} lokal${locCount !== 1 ? 'er' : ''}`;

        // Group by locality
        const byLoc = {};
        for (const o of obs) {
          const loc = o.locality || '';
          if (!byLoc[loc]) byLoc[loc] = [];
          byLoc[loc].push(o);
        }

        const locGroups = Object.entries(byLoc).map(([loc, locObs]) => {
          const locShort = shortLoc(loc);
          const locLink = locShort ? `<a href="lokaler.html?lokal=${localitySlug(locShort)}">${locShort}</a>` : 'Okänd lokal';
          const locArtCount = new Set(locObs.map(o => o.taxon_id)).size;
          const times = locObs.map(o => o.time).filter(t => t && t !== '00:00').sort();
          let timeHtml = '';
          if (times.length) {
            const t0 = times[0].substring(0, 5);
            const t1 = times[times.length - 1].substring(0, 5);
            timeHtml = t0 === t1 ? `<span class="diary-locality-time">${t0}</span>` : `<span class="diary-locality-time">${t0}–${t1}</span>`;
          }

          const rows = locObs.map(o => {
            const nameHtml = o.name ? `<a href="statistik.html?art=${toSlug(o.name)}">${o.name}</a>` : '–';
            const linkHtml = o.url ? `<a href="${o.url}" target="_blank" rel="noopener">AP ↗</a>` : '';
            return `<div class="diary-obs-row${o.remarks ? ' has-remarks' : ''}">
              <div class="diary-obs-species">${nameHtml}</div>
              <div class="diary-obs-count">${o.count ? o.count + '\u202fex' : ''}</div>
              <div class="diary-obs-link">${linkHtml}</div>
              ${o.remarks ? `<div class="diary-remarks">${o.remarks}</div>` : ''}
            </div>`;
          }).join('');

          return `<div class="diary-locality-group">
            <div class="diary-locality-header">
              <span class="diary-locality-name">${locLink}${timeHtml ? ` <span class="diary-locality-time">(${timeHtml.replace(/<[^>]+>/g, '')})</span>` : ''}</span>
              <span class="diary-locality-count">${locArtCount} art${locArtCount !== 1 ? 'er' : ''}</span>
            </div>
            ${rows}
          </div>`;
        }).join('');

        return `<div class="diary-day">
          <div class="diary-day-header">
            <span class="diary-day-date">${diaryDate(date)}</span>
            <span class="diary-day-summary">${summary}</span>
          </div>
          ${locGroups}
        </div>`;
      }).join('');
    }

    function renderMap(localities) {
      document.getElementById('my-map').innerHTML = '';
      const map = initMap('my-map', 12);
      const maxCount = Math.max(...localities.map(l => l.count));
      for (const loc of localities) {
        const r = 5 + (loc.count / maxCount) * 18;
        const name = shortLoc(loc.name);
        const popup = `<strong><a href="lokaler.html?lokal=${localitySlug(name)}" style="color:inherit">${name}</a></strong><br>${loc.count} obs`;
        // Invisible hit area for 44px minimum touch target
        if (r < 22) {
          L.circleMarker([loc.lat, loc.lng], {
            radius: 22, fillOpacity: 0, opacity: 0, interactive: true,
          }).bindPopup(popup).addTo(map);
        }
        L.circleMarker([loc.lat, loc.lng], {
          radius: r,
          fillColor: '#2d6a4f',
          fillOpacity: 0.55,
          color: '#fff',
          weight: 1.5,
        })
        .bindPopup(popup)
        .addTo(map);
      }
    }

    function renderTopLocalities(localities) {
      document.getElementById('top-localities').innerHTML = localities.map(loc => {
        const name = shortLoc(loc.name);
        return `<div class="top-item">
          <div><div class="top-item-name"><a href="lokaler.html?lokal=${localitySlug(name)}" style="color:inherit;text-decoration:none">${name}</a></div></div>
          <span class="top-item-count">${loc.count} obs</span>
        </div>`;
      }).join('');
    }

    let _weekdayChart = null, _hourChart = null, _monthChart = null;

    function showChart(canvasId) {
      const skel = document.getElementById(canvasId + 'Skeleton');
      if (skel) skel.remove();
      document.getElementById(canvasId).style.display = '';
    }

    function renderWeekdayChart() {
      const days = ['mån','tis','ons','tor','fre','lör','sön'];
      const counts = Array(7).fill(0);
      for (const o of allObs) {
        const d = new Date(o.date.substring(0, 10) + 'T12:00:00');
        const dow = (d.getDay() + 6) % 7; // mon=0 … sun=6
        counts[dow]++;
      }
      showChart('weekdayChart');
      if (_weekdayChart) { _weekdayChart.destroy(); _weekdayChart = null; }
      _weekdayChart = new Chart(document.getElementById('weekdayChart'), {
        type: 'bar',
        data: {
          labels: days,
          datasets: [{ data: counts, backgroundColor: 'rgba(45,106,79,0.6)', borderColor: '#2d6a4f', borderWidth: 1, borderRadius: 4 }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { callback: v => v.toLocaleString('sv') } },
          },
        },
      });
    }

    function renderHourChart() {
      const counts = Array(24).fill(0);
      let hasTime = false;
      for (const o of allObs) {
        if (o.time && o.time !== '00:00') {
          const h = parseInt(o.time.substring(0, 2), 10);
          counts[h]++;
          hasTime = true;
        }
      }
      if (!hasTime) { document.getElementById('hourChart').parentElement.previousElementSibling.remove(); document.getElementById('hourChart').parentElement.remove(); return; }
      const labels = Array.from({ length: 24 }, (_, i) => String(i).padStart(2, '0'));
      showChart('hourChart');
      if (_hourChart) { _hourChart.destroy(); _hourChart = null; }
      _hourChart = new Chart(document.getElementById('hourChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{ data: counts, backgroundColor: 'rgba(45,106,79,0.6)', borderColor: '#2d6a4f', borderWidth: 1, borderRadius: 4 }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { callback: v => v.toLocaleString('sv') } },
          },
        },
      });
    }

    function renderMonthChart() {
      const months = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
      const counts = Array(12).fill(0);
      for (const o of allObs) {
        const m = parseInt(o.date.substring(5, 7), 10) - 1;
        counts[m]++;
      }
      showChart('monthChart');
      if (_monthChart) { _monthChart.destroy(); _monthChart = null; }
      _monthChart = new Chart(document.getElementById('monthChart'), {
        type: 'bar',
        data: {
          labels: months,
          datasets: [{ data: counts, backgroundColor: 'rgba(45,106,79,0.6)', borderColor: '#2d6a4f', borderWidth: 1, borderRadius: 4 }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { callback: v => v.toLocaleString('sv') } },
          },
        },
      });
    }

    function renderTopObservers(observers, year) {
      if (!observers.length) return;
      document.getElementById('top-observers-section').style.display = '';
      document.getElementById('top-obs-year').textContent = year;
      document.getElementById('top-observers').innerHTML = observers.map((o, i) =>
        `<div class="top-item"${o.name === REPORTER ? ' style="border-color:var(--accent);background:var(--accent-bg)"' : ''}>
          <div><div class="top-item-name">${i + 1}. ${reporterLink(o.name)}</div></div>
          <span class="top-item-count">${o.count.toLocaleString('sv')} obs</span>
        </div>`
      ).join('');
    }

    load();
  </script>
</body>
</html>
