<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tåkern – Historisk statistik</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#2d6a4f">
  <meta name="description" content="20 års fågelstatistik vid Tåkern – trender, fenologi och artsidor.">
  <meta property="og:title" content="Tåkern – Historisk statistik">
  <meta property="og:description" content="20 års fågelstatistik vid Tåkern – trender, fenologi och artsidor.">
  <meta property="og:image" content="https://pierrea.se/takern/og-image.jpg">
  <meta property="og:url" content="https://pierrea.se/takern/statistik.html">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="sv_SE">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Section nav */
    .section-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding: 0 1rem;
      gap: 0;
      min-height: 0;
      transition: min-height 0.2s;
    }
    .section-nav:empty { border-bottom: none; }
    .section-nav::-webkit-scrollbar { display: none; }
    .section-nav a {
      padding: 0.55rem 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .section-nav a:hover { color: var(--accent); }
    .section-nav a.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }
    [id^="sec-"] { scroll-margin-top: 3rem; }

    /* Top species list */
    .top-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 2rem;
    }

    .top-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .top-item:hover { border-color: var(--accent); }

    .top-item .rank {
      color: var(--muted);
      font-size: 0.85rem;
      width: 2rem;
    }

    .top-item .name { font-weight: 600; flex: 1; min-width: 0; }
    .top-item .sci { font-style: italic; color: var(--muted); font-size: 0.85rem; margin-left: 0.5rem; flex-shrink: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .top-item .obs-count { color: var(--muted); font-size: 0.9rem; margin-left: 1rem; white-space: nowrap; flex-shrink: 0; }

    /* Record counts */
    .record-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 2rem;
    }

    .record-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .record-item .count {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--accent);
      white-space: nowrap;
    }

    .record-item .meta {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* Calendar */
    .heatmap-section {
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 2rem;
      overflow-x: auto;
    }
    .heatmap-section h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .heatmap-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    .heatmap-table th {
      padding: 0.3rem 0.4rem;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
    }
    .heatmap-table th:first-child {
      text-align: left;
      min-width: 3rem;
    }
    .heatmap-table td {
      padding: 0.25rem 0.3rem;
      text-align: center;
      border-radius: 3px;
      font-size: 0.75rem;
      color: white;
      font-weight: 500;
    }
    .heatmap-table td.empty {
      background: #f0f0f0;
      color: transparent;
    }

    /* Trends section */
    .trends-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 2rem;
    }
    .trends-section h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }
    .trends-section .trends-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .trends-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    .trends-col h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .trends-col h3 .arrow-up { color: #2d6a4f; }
    .trends-col h3 .arrow-down { color: #c0392b; }
    .trend-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.45rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .trend-item:last-child { border-bottom: none; }
    .trend-item:hover { background: var(--accent-light); margin: 0 -0.5rem; padding-left: 0.5rem; padding-right: 0.5rem; border-radius: 6px; }
    .trend-rank {
      color: var(--muted);
      font-size: 0.8rem;
      width: 1.5rem;
      text-align: right;
      flex-shrink: 0;
    }
    .trend-info {
      flex: 1;
      min-width: 0;
    }
    .trend-name {
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .trend-rates {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .trend-sparkline {
      width: 60px;
      height: 24px;
      flex-shrink: 0;
    }
    .trend-change {
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 2.5rem;
      text-align: right;
    }
    .trend-change.up { color: #2d6a4f; }
    .trend-change.down { color: #c0392b; }
    .trends-method {
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .trends-method summary {
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
    }
    .trends-method p {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
      margin: 0.5rem 0 0;
    }

    @media (max-width: 700px) {
      .trends-columns { grid-template-columns: 1fr; }
      .trend-sparkline { width: 48px; height: 20px; }
    }

    @media (max-width: 600px) {
    }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <div>
        <h1><a href="index.html">Fågelobservationer vid Tåkern</a></h1>
        <p>20 år av fågeldata · 2006–2026</p>
      </div>
    </div>
    <nav>
      <a href="index.html">Senaste</a>
      <a href="veckorapport.html">Denna vecka</a>
      <a href="statistik.html" class="active">Statistik</a>
      <a href="arter.html">Arter</a>
      <a href="om.html">Om</a>
    </nav>
  </header>

  <nav class="section-nav" id="section-nav"></nav>

  <div class="container">
    <!-- Summary cards (shown immediately with skeleton) -->
    <div id="summary-cards">
      <div class="summary">
        <div class="summary-card"><div class="label">Observationer</div><div class="value" id="stat-obs">–</div><div class="detail" id="stat-dates">Laddar...</div></div>
        <div class="summary-card"><div class="label">Arter</div><div class="value" id="stat-species">–</div><div class="detail">registrerade fågelarter</div></div>
        <div class="summary-card"><div class="label">Observatörer</div><div class="value" id="stat-observers">–</div><div class="detail">unika rapportörer</div></div>
        <div class="summary-card"><div class="label">Snitt per år</div><div class="value" id="stat-avg">–</div><div class="detail">observationer</div></div>
      </div>
    </div>

    <!-- Overview section (filled progressively) -->
    <div id="overview-section">
      <div class="loading" id="loading">Laddar diagram och kartor...</div>
    </div>
  </div>

  <script src="utils.js"></script>
  <script>
    // ── State ──
    let speciesCache = null;

    function toSlug(name) {
      return name.toLowerCase()
        .replace(/[åä]/g, "a").replace(/ö/g, "o").replace(/é/g, "e")
        .replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }

    // ── Section navigation ──
    const OVERVIEW_SECTIONS = [
      { id: "sec-karta", label: "Karta" },
      { id: "trends-container", label: "Trender" },
      { id: "sec-arter", label: "Arter" },
      { id: "sec-artrikedom", label: "Artrikedom" },
      { id: "sec-nyaarter", label: "Nya arter" },
      { id: "sec-rekord", label: "Rekord" },
      { id: "sec-perar", label: "Per år" },
      { id: "sec-aktivitet", label: "Aktivitet" },
      { id: "sec-observatorer", label: "Observatörer" },
    ];
    let sectionObserver = null;

    function updateSectionNav(sections) {
      const nav = document.getElementById("section-nav");
      nav.innerHTML = sections.map(s =>
        `<a href="#${s.id}" data-sec="${s.id}">${s.label}</a>`
      ).join("");

      // Smooth scroll on click
      nav.querySelectorAll("a").forEach(a => {
        a.addEventListener("click", e => {
          e.preventDefault();
          const el = document.getElementById(a.dataset.sec);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });

      // Observe sections for active highlighting
      if (sectionObserver) sectionObserver.disconnect();
      const navLinks = nav.querySelectorAll("a");
      sectionObserver = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          const link = nav.querySelector(`[data-sec="${entry.target.id}"]`);
          if (link) {
            if (entry.isIntersecting) link.classList.add("active");
            else link.classList.remove("active");
          }
        });
        // If none active, activate first visible
        if (!nav.querySelector("a.active")) {
          const first = sections.find(s => {
            const el = document.getElementById(s.id);
            return el && el.getBoundingClientRect().bottom > 0;
          });
          if (first) nav.querySelector(`[data-sec="${first.id}"]`)?.classList.add("active");
        }
        // Auto-scroll nav to show active item
        const active = nav.querySelector("a.active");
        if (active) active.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
      }, { rootMargin: "-50px 0px -60% 0px", threshold: 0 });

      sections.forEach(s => {
        const el = document.getElementById(s.id);
        if (el) sectionObserver.observe(el);
      });
    }

    // ── Load overview ──

    async function loadOverview() {
      const overviewResp = await fetch("stats-api.php?q=overview");
      const overview = await overviewResp.json();
      loadOverviewFromData(overview);
    }

    function loadOverviewFromData(overview, geoData, localitiesData) {
      // Fill in summary cards
      document.getElementById("stat-obs").textContent = overview.total_observations.toLocaleString("sv");
      document.getElementById("stat-dates").textContent = `${overview.date_range.from} – ${overview.date_range.to}`;
      document.getElementById("stat-species").textContent = overview.total_species;
      document.getElementById("stat-observers").textContent = overview.total_observers.toLocaleString("sv");
      document.getElementById("stat-avg").textContent = Math.round(overview.total_observations / Object.keys(overview.observations_per_year).length).toLocaleString("sv");

      const section = document.getElementById("overview-section");
      let html = "";

      // 1. Geo heatmap + localities
      html += `<div class="chart-section" id="sec-karta">
        <h2>Geografisk spridning av observationer</h2>
        <div id="overviewMap" class="geo-heatmap"></div>
        ${overview.top_localities && overview.top_localities.length > 0 ? `
          <h3 style="font-size:0.95rem;font-weight:600;margin:1rem 0 0.5rem">Mest rapporterade lokaler</h3>
          <div class="locality-list">
            ${overview.top_localities.map(l => `
              <div class="locality-item">
                <span>${l.name}</span>
                <span style="color:var(--muted)">${l.count.toLocaleString("sv")} obs</span>
              </div>
            `).join("")}
          </div>
        ` : ""}
      </div>`;

      // 2. Trends placeholder (filled async)
      html += `<div id="trends-container"></div>`;

      // 3. Top 20 species
      html += `<div class="section-title" id="sec-arter">De mest rapporterade arterna 2006–2026</div>
      <div class="top-list">
        ${overview.top_species.map((s, i) => `
          <div class="top-item" data-taxon="${s.taxon_id}">
            <span class="rank">${i + 1}.</span>
            <span class="name">${s.name}</span>
            <span class="sci">${s.scientific}</span>
            <span class="obs-count">${s.count.toLocaleString("sv")} obs</span>
          </div>
        `).join("")}
      </div>`;

      // 4. Species richness per month
      if (overview.richness_per_month) {
        const months = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
        html += `<div class="chart-section" id="sec-artrikedom">
          <h2>Artrikedom per månad</h2>
          <div class="chart-container"><canvas id="richnessChart"></canvas></div>
        </div>`;
      }

      // 5. New species per year (skip first year – all species are "new")
      if (overview.new_species_per_year) {
        const allNsYears = Object.keys(overview.new_species_per_year).sort();
        const nsYears = allNsYears.slice(1);
        html += `<div class="chart-section" id="sec-nyaarter">
          <h2>Nya arter per år</h2>
          <div class="chart-container"><canvas id="newSpeciesChart"></canvas></div>
          <div style="max-height:200px;overflow-y:auto;margin-top:1rem">
            ${nsYears.reverse().map(y => {
              const d = overview.new_species_per_year[y];
              return d.count > 0 ? `<div style="padding:0.3rem 0;border-bottom:1px solid var(--border);font-size:0.85rem">
                <strong>${y}</strong> – ${d.count} nya: <span style="color:var(--muted)">${d.names}</span>
              </div>` : "";
            }).join("")}
          </div>
        </div>`;
      }

      // 6. Record counts
      html += `<div class="section-title" id="sec-rekord">Största rapporterade antal – enskilda observationer</div>
      <div class="record-list">
        ${overview.record_counts.slice(0, 10).map(r => `
          <div class="record-item" data-taxon="${r.taxon_id}">
            <div>
              <span class="name" style="font-weight:600;cursor:pointer">${r.name}</span>
              <div class="meta">${r.date}${r.locality ? ` · ${r.locality}` : ""}${r.url ? ` · <a href="${r.url}" target="_blank" rel="noopener" style="color:var(--accent)">Artportalen ↗</a>` : ""}</div>
            </div>
            <div class="count">${r.count.toLocaleString("sv")} ex</div>
          </div>
        `).join("")}
      </div>`;

      // 7. Observations per year chart
      const years = Object.keys(overview.observations_per_year).sort();
      const counts = years.map(y => overview.observations_per_year[y]);
      html += `<div class="chart-section" id="sec-perar">
        <h2>Antal enskilda rapporter från Tåkern per år</h2>
        <div class="chart-container"><canvas id="yearChart"></canvas></div>
      </div>`;

      // 8. Rapporteringsaktivitet per månad (heatmap table)
      if (overview.heatmap) {
        const hYears = Object.keys(overview.heatmap).sort();
        const months = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
        const allVals = hYears.flatMap(y => Object.values(overview.heatmap[y]));
        const maxVal = Math.max(...allVals);

        function heatColor(n) {
          if (!n) return "";
          const t = n / maxVal;
          const r = Math.round(235 - t * 190);
          const g = Math.round(245 - t * 120);
          const b = Math.round(230 - t * 155);
          if (t > 0.5) return `background:rgb(${r},${g},${b});color:#fff`;
          return `background:rgb(${r},${g},${b});color:#1b4332`;
        }

        html += `<div class="heatmap-section" id="sec-aktivitet">
          <h2>Rapporteringsaktivitet per månad</h2>
          <table class="heatmap-table">
            <thead><tr><th></th>${months.map(m => `<th>${m}</th>`).join("")}</tr></thead>
            <tbody>
              ${hYears.map(y => `<tr>
                <th>${y}</th>
                ${[...Array(12)].map((_, i) => {
                  const v = overview.heatmap[y]?.[String(i + 1)];
                  return v
                    ? `<td style="${heatColor(v)}" title="${months[i]} ${y}: ${v.toLocaleString("sv")} obs">${v.toLocaleString("sv")}</td>`
                    : `<td class="empty">0</td>`;
                }).join("")}
              </tr>`).join("")}
            </tbody>
          </table>
        </div>`;
      }

      // 9. Top observers per year
      if (overview.top_observers) {
        const obsYears = Object.keys(overview.top_observers).sort().reverse();
        html += `<div class="chart-section" id="sec-observatorer">
          <h2>Mest aktiva observatörer</h2>
          <div style="max-height:400px;overflow-y:auto">
            ${obsYears.map(y => `
              <div style="margin-bottom:0.75rem">
                <div style="font-weight:600;font-size:0.9rem;margin-bottom:0.3rem">${y}</div>
                ${overview.top_observers[y].map((o, i) => `
                  <div class="locality-item">
                    <span>${i + 1}. ${o.name}</span>
                    <span style="color:var(--muted)">${o.count.toLocaleString("sv")} obs</span>
                  </div>
                `).join("")}
              </div>
            `).join("")}
          </div>
        </div>`;
      }

      // 10. Time of day
      if (overview.time_of_day) {
        const todKeys = Object.keys(overview.time_of_day);
        if (todKeys.length > 0) {
          html += `<div class="chart-section">
            <h2>Tid på dygnet</h2>
            <div class="chart-container"><canvas id="overviewTodChart"></canvas></div>
          </div>`;
        }
      }

      html += `<footer>
        Data från <a href="https://www.artportalen.se">Artportalen</a>, Ringmärkningscentralen, Svensk Fågeltaxering m.fl. via <a href="https://www.artdatabanken.se">SLU Artdatabanken</a> ·
        ${overview.total_observations.toLocaleString("sv")} observationer · ${overview.date_range.from} – ${overview.date_range.to}
      </footer>`;

      section.innerHTML = html;

      // Init overview geo heatmap
      const overviewMap = initMap("overviewMap");

      function applyGeo(data) {
        const logPoints = data.points.map(p => [p[0], p[1], Math.log(p[2] + 1)]);
        const vals = logPoints.map(p => p[2]).sort((a, b) => a - b);
        const p50 = vals[Math.floor(vals.length * 0.5)];
        L.heatLayer(logPoints, {
          radius: 22, blur: 12, maxZoom: 17, minOpacity: 0.15, max: p50,
          gradient: HEATMAP_GRADIENT,
        }).addTo(overviewMap);
      }

      if (geoData) applyGeo(geoData);
      else fetch("stats-api.php?q=geo").then(r => r.json()).then(applyGeo);

      // Load locality markers (shown at zoom >= 15)
      if (localitiesData) addLocalityMarkers(overviewMap, localitiesData.localities);
      else fetch("stats-api.php?q=localities").then(r => r.json()).then(d => addLocalityMarkers(overviewMap, d.localities));

      // Render year chart
      const ctx = document.getElementById("yearChart");
      new Chart(ctx, {
        type: "bar",
        data: {
          labels: years,
          datasets: [{
            label: "Observationer",
            data: counts,
            backgroundColor: "rgba(45, 106, 79, 0.6)",
            borderColor: "#2d6a4f",
            borderWidth: 1,
            borderRadius: 4,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: "rgba(0,0,0,0.05)" },
              ticks: { callback: v => v.toLocaleString("sv") },
            },
          },
        },
      });

      // Render species richness per month
      if (overview.richness_per_month) {
        const months = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
        const richData = Array.from({ length: 12 }, (_, i) => overview.richness_per_month[i + 1] || 0);
        new Chart(document.getElementById("richnessChart"), {
          type: "bar",
          data: {
            labels: months,
            datasets: [{
              label: "Snitt antal arter",
              data: richData,
              backgroundColor: "rgba(45, 106, 79, 0.6)",
              borderColor: "#2d6a4f",
              borderWidth: 1,
              borderRadius: 4,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, grid: { color: "rgba(0,0,0,0.05)" } },
            },
          },
        });
      }

      // Render new species per year chart (skip first year)
      if (overview.new_species_per_year) {
        const nsYears = Object.keys(overview.new_species_per_year).sort().slice(1);
        new Chart(document.getElementById("newSpeciesChart"), {
          type: "bar",
          data: {
            labels: nsYears,
            datasets: [{
              label: "Nya arter",
              data: nsYears.map(y => overview.new_species_per_year[y].count),
              backgroundColor: "rgba(45, 106, 79, 0.6)",
              borderColor: "#2d6a4f",
              borderWidth: 1,
              borderRadius: 4,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, grid: { color: "rgba(0,0,0,0.05)" } },
            },
          },
        });
      }

      // Render overview time of day chart
      if (overview.time_of_day && Object.keys(overview.time_of_day).length > 0) {
        const hours = Array.from({ length: 24 }, (_, i) => i);
        new Chart(document.getElementById("overviewTodChart"), {
          type: "bar",
          data: {
            labels: hours.map(h => `${String(h).padStart(2, "0")}:00`),
            datasets: [{
              label: "Observationer",
              data: hours.map(h => overview.time_of_day[h] || 0),
              backgroundColor: "rgba(45, 106, 79, 0.6)",
              borderColor: "#2d6a4f",
              borderWidth: 1,
              borderRadius: 3,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { maxTicksLimit: 12 } },
              y: { beginAtZero: true, grid: { color: "rgba(0,0,0,0.05)" } },
            },
          },
        });
      }

      // Wire up click handlers – navigate to arter.html
      document.querySelectorAll("[data-taxon]").forEach(el => {
        el.style.cursor = "pointer";
        el.addEventListener("click", () => {
          const nameEl = el.querySelector(".name");
          if (nameEl) {
            const slug = toSlug(nameEl.textContent);
            window.location.href = `arter.html?art=${slug}`;
          }
        });
      });

      // Section nav for overview
      updateSectionNav(OVERVIEW_SECTIONS);
    }

    // ── Trends: "Tåkerns fågelfauna i förändring" ──

    function drawSparkline(canvas, values, color) {
      const ctx = canvas.getContext("2d");
      const w = canvas.width = canvas.offsetWidth * 2;
      const h = canvas.height = canvas.offsetHeight * 2;
      ctx.scale(2, 2);
      const cw = canvas.offsetWidth;
      const ch = canvas.offsetHeight;
      const pad = 2;
      const n = values.length;
      if (n < 2) return;

      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.lineJoin = "round";
      for (let i = 0; i < n; i++) {
        const x = pad + (i / (n - 1)) * (cw - 2 * pad);
        const y = ch - pad - values[i] * (ch - 2 * pad);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Fill area under line
      ctx.lineTo(pad + (cw - 2 * pad), ch - pad);
      ctx.lineTo(pad, ch - pad);
      ctx.closePath();
      ctx.fillStyle = color.replace("1)", "0.1)");
      ctx.fill();
    }

    function renderTrends(data) {
      const container = document.getElementById("trends-container");
      if (!container || !data || !data.increasing) return;

      function trendItemHtml(item, rank) {
        const isUp = item.mean_last5_pct > item.mean_first5_pct;
        const changeClass = isUp ? "up" : "down";
        const arrow = isUp ? "▲" : "▼";
        const f5 = item.mean_first5_pct < 1 ? item.mean_first5_pct.toFixed(1) : Math.round(item.mean_first5_pct);
        const l5 = item.mean_last5_pct < 1 ? item.mean_last5_pct.toFixed(1) : Math.round(item.mean_last5_pct);
        return `<div class="trend-item" data-taxon="${item.taxon_id}">
          <span class="trend-rank">${rank}.</span>
          <div class="trend-info">
            <div class="trend-name">${item.name}</div>
            <div class="trend-rates">${f5} % → ${l5} %</div>
          </div>
          <canvas class="trend-sparkline" data-spark='${JSON.stringify(item.sparkline)}' data-color="${isUp ? 'rgba(45,106,79,1)' : 'rgba(192,57,43,1)'}"></canvas>
          <span class="trend-change ${changeClass}">${arrow}</span>
        </div>`;
      }

      const yearRange = data.years[0] + "–" + data.years[data.years.length - 1];
      container.innerHTML = `<div class="trends-section">
        <h2>Tåkerns fågelfauna i förändring</h2>
        <div class="trends-subtitle">Arter med störst förändring i rapportfrekvens ${yearRange}</div>
        <div class="trends-columns">
          <div class="trends-col">
            <h3><span class="arrow-up">▲</span> Mest ökande</h3>
            ${data.increasing.map((item, i) => trendItemHtml(item, i + 1)).join("")}
          </div>
          <div class="trends-col">
            <h3><span class="arrow-down">▼</span> Mest minskande</h3>
            ${data.decreasing.map((item, i) => trendItemHtml(item, i + 1)).join("")}
          </div>
        </div>
        <details class="trends-method">
          <summary>Hur vi mäter trender</summary>
          <p>Trender baseras på <em>rapportfrekvens</em> – andelen fältbesök (unika datum+lokal) som noterar arten – inte råa antal. Rapportfrekvens speglar hur ofta en art påträffas vid fältbesök, inte förändringar i faktiskt antal individer – det kräver standardiserade inventeringar. Det kompenserar automatiskt för att antalet rapportörer vid Tåkern tredubblats under perioden. Trenden beräknas med Theil-Sen-regression, en robust metod som inte påverkas av enstaka extremår. Arter rankas efter relativ förändring i rapportfrekvens. Arter som genomgått taxonomiska uppdelningar (t.ex. sädgås → skogsgås + tundragås) slås ihop till den ursprungliga arten för att undvika att omklassificeringar tolkas som verkliga förändringar.</p>
        </details>
      </div>`;

      // Draw sparklines
      container.querySelectorAll(".trend-sparkline").forEach(canvas => {
        const vals = JSON.parse(canvas.dataset.spark);
        const color = canvas.dataset.color;
        // Need to wait for layout
        requestAnimationFrame(() => drawSparkline(canvas, vals, color));
      });

      // Wire up click handlers – navigate to arter.html
      container.querySelectorAll("[data-taxon]").forEach(el => {
        el.style.cursor = "pointer";
        el.addEventListener("click", () => {
          const nameEl = el.querySelector(".name, .trend-name");
          if (nameEl) {
            const slug = toSlug(nameEl.textContent);
            window.location.href = `arter.html?art=${slug}`;
          }
        });
      });
    }

    // ── Init – single batch request for all data ──
    async function init() {
      try {
        const resp = await fetch("stats-api.php?q=init");
        const data = await resp.json();

        if (data.overview) {
          loadOverviewFromData(data.overview, data.geo, data.localities);
        }
        if (data.species) {
          speciesCache = data.species.species;
        }
        if (data.trends) {
          renderTrends(data.trends);
        } else {
          fetch("stats-api.php?q=trends").then(r => r.json()).then(renderTrends).catch(() => {});
        }
      } catch (err) {
        console.error("Init failed, falling back to individual requests", err);
        loadOverview();
        fetch("stats-api.php?q=trends").then(r => r.json()).then(renderTrends).catch(() => {});
      }

      // Redirect old ?art= deep-links to arter.html
      const params = new URLSearchParams(window.location.search);
      const artSlug = params.get("art");
      if (artSlug) {
        window.location.replace(`arter.html?art=${artSlug}`);
        return;
      }

      updateSectionNav(OVERVIEW_SECTIONS);
    }
    init();
  </script>
</body>
