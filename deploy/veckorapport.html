<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tåkern – Veckorapport</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#2d6a4f">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    /* Page-specific styles for veckorapport */

    .highlights {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .highlight-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .highlight-card.first-of-year {
      border-left: 4px solid var(--purple);
    }

    .highlight-card.notable {
      border-left: 4px solid var(--red);
    }

    .highlight-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    .highlight-content { flex: 1; }
    .highlight-content .species { font-weight: 600; }
    .highlight-content .context {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .badge {
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    /* Species table */
    .species-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-bottom: 2rem;
    }

    .species-table th {
      text-align: left;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.5rem 0.75rem;
      border-bottom: 2px solid var(--border);
    }

    .species-table td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      vertical-align: middle;
    }

    .species-table tr:last-child td { border-bottom: none; }
    .species-table .species-name { font-weight: 600; }
    .species-table .scientific { font-style: italic; color: var(--muted); font-size: 0.8rem; }

    .days-dots {
      display: flex;
      gap: 3px;
    }

    .day-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
    }

    .day-dot.active { background: var(--accent); }

    .no-highlights {
      color: var(--muted);
      font-size: 0.9rem;
      font-style: italic;
      margin-bottom: 2rem;
    }

    #weekMap {
      height: 450px;
      width: 100%;
    }

    @media (max-width: 600px) {
      #weekMap { height: 300px; }
      .species-table .scientific { display: none; }
      .species-table .hist-col { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Tåkern – Veckorapport</h1>
      <p id="header-desc">Laddar...</p>
    </div>
    <nav>
      <a href="index.html">Senaste obs</a>
      <a href="statistik.html">Historisk statistik</a>
    </nav>
  </header>

  <div class="container" id="main">
    <div class="loading" id="loading">Hämtar observationer...</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="utils.js"></script>
  <script>
    const DAYS_BACK = 7;

    // ── Helpers ──

    function formatDayShort(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString("sv-SE", { weekday: "short", day: "numeric", month: "short" });
    }

    // ── Data processing ──

    function processLiveData(records) {
      const now = new Date();
      const allDates = [];
      const byDate = {};

      for (let i = DAYS_BACK; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        byDate[key] = [];
        allDates.push(key);
      }

      for (const obs of records) {
        const dateKey = (obs.event?.startDate || "").slice(0, 10);
        if (byDate[dateKey]) byDate[dateKey].push(obs);
      }

      const dailyStats = allDates.map(date => {
        const dayObs = byDate[date];
        const species = new Set(dayObs.map(o => o.taxon?.vernacularName));
        return { date, obs: dayObs.length, species: species.size };
      });

      // Species aggregation – also track first occurrenceId for Artportalen link
      const speciesMap = {};
      for (const obs of records) {
        const name = obs.taxon?.vernacularName || obs.taxon?.scientificName;
        const taxonId = obs.taxon?.id;
        if (!name) continue;
        if (!speciesMap[name]) {
          speciesMap[name] = {
            name,
            taxonId: taxonId ? String(taxonId) : null,
            scientific: obs.taxon?.scientificName || "",
            redlist: obs.taxon?.attributes?.redlistCategory || "",
            totalCount: 0,
            maxCount: 0,
            daysSeen: new Set(),
            firstOccurrenceId: null,
            firstObsDate: null,
          };
        }
        const sp = speciesMap[name];
        const count = parseInt(obs.occurrence?.individualCount) || 1;
        sp.totalCount += count;
        if (count > sp.maxCount) sp.maxCount = count;
        const dateKey = (obs.event?.startDate || "").slice(0, 10);
        sp.daysSeen.add(dateKey);
        // Track earliest observation's occurrenceId for linking
        if (!sp.firstObsDate || dateKey < sp.firstObsDate) {
          sp.firstObsDate = dateKey;
          sp.firstOccurrenceId = obs.occurrence?.occurrenceId || null;
        }
      }

      const speciesList = Object.values(speciesMap).map(sp => ({
        ...sp,
        daysSeen: [...sp.daysSeen].sort(),
        firstSeen: [...sp.daysSeen].sort()[0],
      }));
      speciesList.sort((a, b) => b.totalCount - a.totalCount);

      const totalObs = records.length;
      const uniqueSpecies = new Set(records.map(o => o.taxon?.vernacularName)).size;

      return { dailyStats, speciesList, totalObs, uniqueSpecies, allDates };
    }

    function crossReference(liveData, context) {
      const yearFirsts = context.year_firsts || {};
      const dbPhenology = context.phenology || {};

      const firstOfYear = [];

      // Use the same date range as shown in the header
      const weekStart = liveData.allDates[0];

      for (const sp of liveData.speciesList) {
        const tid = sp.taxonId;
        if (!tid) continue;

        const yearData = yearFirsts[tid];
        const phen = dbPhenology[tid]; // DB phenology (5 yrs, excl. January)
        const firstDateThisYear = yearData?.first_date;

        // Species whose first obs this year falls within this week's date range
        const isRecentFirst = !firstDateThisYear || firstDateThisYear >= weekStart;
        // Exclude obvious year-round residents: if in DB and first_date is January, skip
        const isJanuaryResident = firstDateThisYear && firstDateThisYear.slice(5, 7) === "01";

        if (isRecentFirst && !isJanuaryResident) {
          firstOfYear.push({
            ...sp,
            firstDate: firstDateThisYear || sp.firstSeen,
            firstUrl: yearData?.first_url || null,
            historicalTypical: phen?.avg_first_date || null,
            historicalEarliest: phen?.earliest_date || null,
            earliestYear: phen?.earliest_year || null,
            yearsSeen: phen?.years_seen || null,
            yearRange: phen?.year_range || null,
            hasPhenology: !!phen,
          });
        }
      }

      // Sort: species with phenology data first, then by date
      firstOfYear.sort((a, b) => (b.hasPhenology ? 1 : 0) - (a.hasPhenology ? 1 : 0) || a.firstDate.localeCompare(b.firstDate));

      return { firstOfYear };
    }

    // ── Rendering ──

    function render(liveData, highlights, records) {
      const container = document.getElementById("main");

      const dateRange = `${formatDayShort(liveData.allDates[0])} – ${formatDayShort(liveData.allDates[liveData.allDates.length - 1])}`;
      document.getElementById("header-desc").innerHTML =
        `${dateRange} · Data från <a href="https://www.artportalen.se" style="color:#d8f3dc">Artportalen</a> · Historik från <a href="statistik.html" style="color:#d8f3dc">20 års databas</a>`;

      let html = "";

      // Summary cards
      html += `<div class="summary">`;
      html += `<div class="summary-card">
        <div class="label">Observationer</div>
        <div class="value">${liveData.totalObs.toLocaleString("sv")}</div>
        <div class="detail">senaste ${DAYS_BACK} dagarna</div>
      </div>`;
      html += `<div class="summary-card">
        <div class="label">Arter</div>
        <div class="value">${liveData.uniqueSpecies}</div>
        <div class="detail">unika arter</div>
      </div>`;
      html += `<div class="summary-card">
        <div class="label">Årets första</div>
        <div class="value">${highlights.firstOfYear.length}</div>
        <div class="detail">arter nya för säsongen</div>
      </div>`;
      const redlistedThisWeek = [...new Set(liveData.speciesList
        .filter(s => s.redlist && s.redlist !== "LC")
        .map(s => s.name))];
      html += `<div class="summary-card">
        <div class="label">Rödlistade</div>
        <div class="value">${redlistedThisWeek.length}</div>
        <div class="detail">${redlistedThisWeek.slice(0, 3).join(", ") || "–"}${redlistedThisWeek.length > 3 ? " ..." : ""}</div>
      </div>`;
      html += `</div>`;

      // Map – after summary cards, like statistik.html
      html += `<div class="map-section">
        <h2>Karta – veckans observationer</h2>
        <div id="weekMap"></div>
      </div>`;

      // First of year section
      html += `<div class="section-title">Nya observationer för året från veckan som gått</div>`;
      if (highlights.firstOfYear.length > 0) {
        html += `<div class="highlights">`;
        for (const sp of highlights.firstOfYear) {
          let contextParts = [];
          contextParts.push(`Först sedd ${formatDateSwedish(sp.firstDate)}`);
          if (sp.historicalTypical) contextParts.push(`Normalt först ${sp.historicalTypical}`);
          if (sp.historicalEarliest) contextParts.push(`Tidigast ${sp.historicalEarliest}${sp.earliestYear ? ` (${sp.earliestYear})` : ""}`);
          const context = contextParts.join(" · ");

          const speciesLink = sp.taxonId ? `<a href="statistik.html?art=${sp.taxonId}" style="color:inherit">${sp.name}</a>` : sp.name;
          const firstObsLink = sp.firstUrl ? ` · <a href="${sp.firstUrl}" target="_blank" rel="noopener" style="color:var(--accent)">Visa obs</a>` : "";

          html += `<div class="highlight-card first-of-year">
            <div class="highlight-content">
              <div class="species">${speciesLink} <span class="badge badge-purple">Årets första</span></div>
              <div class="context">${context}${firstObsLink}</div>
            </div>
          </div>`;
        }
        html += `</div>`;
      } else {
        html += `<p class="no-highlights">Inga nya arter för säsongen denna vecka.</p>`;
      }

      // Chart
      html += `<div class="chart-section">
        <h2>Aktivitet per dag</h2>
        <div class="chart-container"><canvas id="dailyChart"></canvas></div>
      </div>`;

      // Full species table
      html += `<div class="section-title">Alla arter denna vecka (${liveData.speciesList.length})</div>`;
      html += `<table class="species-table">
        <thead><tr>
          <th>Art</th>
          <th>Antal</th>
          <th>Dagar</th>
          <th class="hist-col">Status</th>
        </tr></thead><tbody>`;

      const firstOfYearNames = new Set(highlights.firstOfYear.map(s => s.name));

      for (const sp of liveData.speciesList) {
        let statusBadges = "";
        if (firstOfYearNames.has(sp.name)) statusBadges += `<span class="badge badge-purple">Årets 1:a</span> `;
        const rlBadge = redlistBadgeHtml(sp.redlist);

        const dots = liveData.allDates.map(d =>
          `<div class="day-dot${sp.daysSeen.includes(d) ? " active" : ""}" title="${formatDayShort(d)}"></div>`
        ).join("");

        html += `<tr>
          <td><span class="species-name">${sp.name}</span>${rlBadge}<br><span class="scientific">${sp.scientific}</span></td>
          <td>${sp.totalCount}</td>
          <td><div class="days-dots">${dots}</div></td>
          <td class="hist-col">${statusBadges || "–"}</td>
        </tr>`;
      }

      html += `</tbody></table>`;

      html += `<footer>
        Fenologi baserad på senaste 5 åren (exkl. januariobservationer) ·
        Data från <a href="https://www.artportalen.se">Artportalen</a> via <a href="https://www.artdatabanken.se">SLU Artdatabanken</a> ·
        Uppdaterad ${new Date().toLocaleString("sv-SE")}
      </footer>`;

      container.innerHTML = html;
      renderChart(liveData.dailyStats);
      renderMap(records);
    }

    function renderChart(dailyStats) {
      const ctx = document.getElementById("dailyChart");
      if (!ctx) return;

      const labels = dailyStats.map(d => {
        const date = new Date(d.date);
        return date.toLocaleDateString("sv-SE", { weekday: "short", day: "numeric", month: "numeric" });
      });

      new Chart(ctx, {
        type: "bar",
        data: {
          labels,
          datasets: [
            {
              label: "Observationer",
              data: dailyStats.map(d => d.obs),
              backgroundColor: "rgba(45, 106, 79, 0.6)",
              borderColor: "#2d6a4f",
              borderWidth: 1,
              borderRadius: 4,
              yAxisID: "y",
            },
            {
              label: "Arter",
              data: dailyStats.map(d => d.species),
              type: "line",
              borderColor: "#b45309",
              backgroundColor: "rgba(180, 83, 9, 0.1)",
              borderWidth: 2,
              pointRadius: 4,
              pointBackgroundColor: "#b45309",
              fill: true,
              tension: 0.3,
              yAxisID: "y1",
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: { legend: { position: "top" } },
          scales: {
            y: {
              type: "linear",
              position: "left",
              title: { display: true, text: "Observationer" },
              beginAtZero: true,
              grid: { color: "rgba(0,0,0,0.05)" },
            },
            y1: {
              type: "linear",
              position: "right",
              title: { display: true, text: "Arter" },
              beginAtZero: true,
              grid: { drawOnChartArea: false },
            },
          },
        },
      });
    }

    function renderMap(records) {
      const mapEl = document.getElementById("weekMap");
      if (!mapEl) return;

      const map = initMap("weekMap");

      // Aggregate heatmap points by rounded coordinates
      const grid = {};
      for (const obs of records) {
        const lat = obs.location?.decimalLatitude;
        const lng = obs.location?.decimalLongitude;
        if (!lat || !lng) continue;
        const key = `${(Math.round(lat * 1000) / 1000).toFixed(3)},${(Math.round(lng * 1000) / 1000).toFixed(3)}`;
        if (!grid[key]) grid[key] = { lat, lng, count: 0 };
        grid[key].count++;
      }

      const points = Object.values(grid);
      if (points.length === 0) return;

      // Heatmap layer
      const heatLayer = createHeatLayer(points);
      if (heatLayer) heatLayer.addTo(map);

      // Locality markers
      const localities = {};
      for (const obs of records) {
        const loc = obs.location?.locality;
        const lat = obs.location?.decimalLatitude;
        const lng = obs.location?.decimalLongitude;
        if (!loc || !lat || !lng) continue;
        if (!localities[loc]) localities[loc] = { name: loc, lat, lng, obs: 0, species: new Set() };
        localities[loc].obs++;
        const sp = obs.taxon?.vernacularName || obs.taxon?.scientificName;
        if (sp) localities[loc].species.add(sp);
      }

      addLocalityMarkers(map, Object.values(localities));
    }

    // ── Init ──

    async function init() {
      try {
        // Fetch live data and historical context in parallel
        const [liveResp, contextResp] = await Promise.all([
          fetch(`api.php?radius=10&days=${DAYS_BACK}`),
          fetch(`stats-api.php?q=week_context&year=${new Date().getFullYear()}`),
        ]);

        const liveRaw = await liveResp.json();
        let context = {};
        try { context = await contextResp.json(); } catch (e) { console.warn("Could not load historical context:", e); }

        if (liveRaw.error) {
          document.getElementById("main").innerHTML =
            `<div class="error"><strong>API-fel:</strong> ${liveRaw.error}<br>${liveRaw.detail || ""}</div>`;
          return;
        }

        const records = liveRaw.records || [];
        if (records.length === 0) {
          document.getElementById("main").innerHTML =
            `<div class="loading">Inga observationer hittades de senaste ${DAYS_BACK} dagarna.</div>`;
          return;
        }

        const liveData = processLiveData(records);
        const highlights = crossReference(liveData, context);
        render(liveData, highlights, records);
      } catch (err) {
        document.getElementById("main").innerHTML =
          `<div class="error">Kunde inte hämta data: ${err.message}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
